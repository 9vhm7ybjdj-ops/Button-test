<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Select Report Type</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  #app {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 30px;
    text-align: center;
  }

  h1 {
    margin-bottom: 25px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    margin: 12px 0;
    font-size: 16px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 4px #00ff00;
    box-shadow: 0 0 8px #00ff00;
    cursor: pointer;
  }

  .btn:active {
    transform: scale(0.97);
  }

  @media print {
    .btn {
      display: none;
    }
  }
</style>
</head>

<body>
<div id="app">

  <h1>Select Report Type</h1>

  <button id="summaryBtn" class="btn">Summary Report</button>
  <button id="detailedBtn" class="btn">Detailed Report</button>
  <button id="backBtn" class="btn">
