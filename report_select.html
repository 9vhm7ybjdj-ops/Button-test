<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Select Report Type</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;

    /* Prevent horizontal scroll on iPhone */
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;

    /* Diagnostic grid background */
    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ⭐ Vertically centered container */
  #app {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 0 16px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    justify-content: center;   /* ⭐ vertical centering */
    align-items: center;       /* ⭐ horizontal centering */

    min-height: 100vh;         /* ⭐ full screen height */
    text-align: center;
  }

  h1 {
    margin-bottom: 20px;
    font-size: 22px;
  }

  /* ⭐ EXACT SAME BUTTON SIZE AS OTHER PAGES */
  .btn {
    display: block;
    width: 180px;
    padding: 8px 12px;
    margin: 12px auto;
    font-size: 16px;
    border-radius: 8px;

    background: #111;
    color: #7CFC00;

    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;

    cursor: pointer;
  }

  .btn:active {
    transform: scale(0.97);
  }

  @media print {
    .btn {
      display: none;
    }
  }
</style>
</head>

<body>
<div id="app">

  <h1>Select Report Type</h1>

  <button id="summaryBtn" class="btn">Summary Report</button>
  <button id="detailedBtn" class="btn">Detailed Report</button>
  <button id="backBtn" class="btn">Back</button>

</div>

<script>
  /* Hide Back button if a report has already been opened */
  if (sessionStorage.getItem("reportOpened") === "1") {
    document.getElementById("backBtn").style.display = "none";
  }

  /* Mark that a report has been opened BEFORE leaving */
  document.getElementById("summaryBtn").onclick = () => {
    sessionStorage.setItem("reportOpened", "1");
    window.location.href = "report.html";
  };

  document.getElementById("detailedBtn").onclick = () => {
    sessionStorage.setItem("reportOpened", "1");
    window.location.href = "detailed_report.html";
  };

  /* Back → ALWAYS return to last unit tested (when visible) */
  document.getElementById("backBtn").onclick = () => {
    const lastUnit = sessionStorage.getItem("lastUnit");
    const lastFace = sessionStorage.getItem("lastFace");

    if (lastUnit && lastFace) {
      window.location.href = `app.html?unit=${lastUnit}&face=${lastFace}`;
    } else {
      window.location.href = "index.html";  // fallback
    }
  };
</script>

</body>
</html>
