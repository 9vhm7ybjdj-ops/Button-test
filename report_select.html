<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Select Report Type</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
  }

  #app {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 30px;
    text-align: center;
  }

  h1 {
    margin-bottom: 30px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin: 15px 0;
    font-size: 20px;
    border-radius: 10px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
  }

  .btn:active {
    transform: scale(0.97);
  }

  @media print {
    .btn {
      display: none;
    }
  }
</style>
</head>

<body>
<div id="app">

  <h1>Select Report Type</h1>

  <button id="summaryBtn" class="btn">Summary Report</button>
  <button id="detailedBtn" class="btn">Detailed Report</button>

  <!-- ⭐ NEW BACK BUTTON -->
  <button id="backBtn" class="btn">Back</button>

</div>

<script>
  document.getElementById("summaryBtn").onclick = () => {
    window.location.href = "report_summary.html";
  };

  document.getElementById("detailedBtn").onclick = () => {
    window.location.href = "detailed_report.html";
  };

  // ⭐ Back button logic
  document.getElementById("backBtn").onclick = () => {
    window.location.href = "index.html";
  };
</script>

</body>
</html>
