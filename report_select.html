<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Select Report Type</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;

    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 40px 10px;
  }

  #selectApp {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .title {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  .button {
    background: rgba(0,0,0,0.7);
    border: 1px solid #44ff44;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
    cursor: pointer;
    text-shadow: 0 0 6px #00ff00;
  }

  .button:hover {
    background: rgba(0,0,0,0.9);
  }
</style>
</head>

<body>
<div id="selectApp">
  <div class="title">Select Report Type</div>

  <div class="button" onclick="goSummary()">Summary Report</div>
  <div class="button" onclick="goDetailed()">Detailed Report</div>

</div>

<script>
  function goSummary() {
    window.location.href = "report.html";
  }

  function goDetailed() {
    window.location.href = "detailed_report.html";
  }
</script>

</body>
</html>
