<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Select Report</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    display: flex;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: 420px;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .header {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 14px #00ff00;
    font-size: 18px;
    cursor: pointer;
    width: 260px;
    text-align: center;
    margin-bottom: 10px;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .red-btn {
    padding: 12px 24px;
    border-radius: 8px;
    background: #220000;
    color: #ff4d4d;
    border: 2px solid #ff0000;
    text-shadow: 0 0 6px #ff0000;
    box-shadow: 0 0 14px #ff0000;
    font-size: 18px;
    cursor: pointer;
    width: 260px;
    text-align: center;
    margin-top: 20px;
  }

  .red-btn:active {
    transform: scale(0.97);
  }

  #confirmOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  #confirmBox {
    width: 300px;
    padding: 20px;
    border-radius: 12px;
    background: linear-gradient(145deg, #d7d9dc, #a5a7aa);
    box-shadow:
      0 0 0 2px #777,
      0 12px 20px rgba(0,0,0,0.6);
    text-align: center;
    color: #111;
    font-size: 16px;
  }

  #confirmButtons {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
  }

  .confirm-cancel {
    padding: 10px 20px;
    border-radius: 8px;
    background: #333;
    color: #fff;
    border: 2px solid #555;
    font-size: 16px;
    cursor: pointer;
  }

  .confirm-cancel:active {
    transform: scale(0.97);
  }

  .confirm-yes {
    padding: 10px 20px;
    border-radius: 8px;
    background: #220000;
    color: #ff4d4d;
    border: 2px solid #ff0000;
    text-shadow: 0 0 6px #ff0000;
    box-shadow: 0 0 14px #ff0000;
    font-size: 16px;
    cursor: pointer;
  }

  .confirm-yes:active {
    transform: scale(0.97);
  }
</style>
</head>

<body>
<div id="app">

  <div class="header">Select Report</div>

  <!-- SUMMARY REPORT (report.html) -->
  <button class="btn" onclick="goMain()">Summary</button>

  <!-- DETAILED REPORT -->
  <button class="btn" onclick="goDetailed()">Detailed Report</button>

  <!-- GRAPHICAL REPORT -->
  <button class="btn" onclick="goGraphical()">Graphical Report</button>

  <!-- NEW TEST -->
  <button class="red-btn" onclick="openConfirm()">New Test</button>

</div>

<!-- Confirmation Modal -->
<div id="confirmOverlay">
  <div id="confirmBox">
    <div>Are you sure you want to clear all data and start a new test</div>

    <div id="confirmButtons">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-yes" onclick="confirmNewTest()">Yes, Start New Test</button>
    </div>
  </div>
</div>

<script>
  function goMain() {
    window.location.href = "report.html";
  }

  function goDetailed() {
    window.location.href = "detailed_report.html";
  }

  function goGraphical() {
    window.location.href = "graphical_report.html";
  }

  function openConfirm() {
    document.getElementById("confirmOverlay").style.display = "flex";
  }

  function closeConfirm() {
    document.getElementById("confirmOverlay").style.display = "none";
  }

  function confirmNewTest() {
    sessionStorage.removeItem("uhcFullData");
    sessionStorage.removeItem("storeName");
    sessionStorage.removeItem("storeNumber");
    sessionStorage.removeItem("dateString");

    window.location.href = "index.html";
  }
</script>

</body>
</html>
