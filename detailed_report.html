<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Detailed UHC Report</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;

    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 20px 10px 40px;
  }

  #reportApp {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .report-header {
    text-align: center;
  }

  .store-line {
    font-size: 18px;
    font-weight: bold;
  }

  .meta-line {
    font-size: 13px;
    opacity: 0.8;
  }

  .overall-summary {
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid #444;
    font-size: 13px;
  }

  .unit-block {
    background: rgba(0,0,0,0.75);
    border-radius: 12px;
    border: 1px solid #555;
    padding: 12px;
  }

  .unit-title {
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .faces-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }

  .face-block {
    flex: 1;
    min-width: 0;
    background: rgba(10,10,10,0.9);
    border-radius: 8px;
    border: 1px solid #333;
    padding: 8px;
  }

  .face-title {
    text-align: center;
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .row-title {
    font-size: 11px;
    font-weight: bold;
    margin-top: 4px;
  }

  .row-cells {
    display: flex;
    gap: 10px;
    font-size: 12px;
    padding: 4px 2px;
    border-radius: 4px;
  }

  /* ⭐ Center PASS / FAIL / --- horizontally */
  .cell {
    min-width: 40px;
    text-align: center;
  }

  .cell-pass {
    color: #9eff9e;
    text-shadow: 0 0 6px #00ff00;
  }

  .cell-fail {
    color: #ffb0b0;
    text-shadow: 0 0 6px #ff0000;
  }

  .cell-un {
    color: #ffeb3b;
    text-shadow: 0 0 6px #ffeb3b;
  }

  /* ⭐ Row-level highlighting */
  .row-pass {
    background: rgba(0, 255, 0, 0.08);
    border-left: 3px solid #00ff00;
  }

  .row-fail {
    background: rgba(255, 0, 0, 0.08);
    border-left: 3px solid #ff0000;
  }

  .row-skip {
    background: rgba(255, 255, 0, 0.08);
    border-left: 3px solid #ffeb3b;
  }

  .face-summary {
    margin-top: 6px;
    text-align: center;
    font-size: 12px;
  }

  .face-status-ok {
    color: #9eff9e;
  }

  .face-status-issues {
    color: #ffb0b0;
  }

  .face-status-skip {
    color: #ffeb3b;
  }

  /* ⭐ GREEN GLOW BUTTONS */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-top: 10px;
  }

  .glow-btn {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 14px #00ff00;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .glow-btn:active {
    transform: scale(0.97);
  }

  @media print {
    .action-buttons {
      display: none;
    }
  }
</style>
</head>

<body>
<div id="reportApp">
  <div class="report-header">
    <div class="store-line" id="storeLine"></div>
    <div class="meta-line" id="metaLine"></div>
  </div>

  <div class="overall-summary" id="overallSummary"></div>

  <div id="unitsContainer"></div>

  <div class="action-buttons">
    <button id="backBtn" class="glow-btn">Back</button>
    <button id="newTestBtn" class="glow-btn">New Test</button>
    <button id="pdfBtn" class="glow-btn">Export PDF</button>
  </div>

</div>

<script>
  const UHC_NAMES = ["Left UHC", "Middle UHC", "Right UHC"];

  const fullData = JSON.parse(sessionStorage.getItem("uhcFullData"));
  const storeName = sessionStorage.getItem("storeName");
  const storeNumber = sessionStorage.getItem("storeNumber");
  const dateString = sessionStorage.getItem("dateString");

  document.getElementById("storeLine").textContent =
    `${storeName} — ${storeNumber}`;
  document.getElementById("metaLine").textContent =
    `Detailed UHC Test Report — ${dateString}`;

  function createEl(tag, cls, text) {
    const el = document.createElement(tag);
    if (cls) el.className = cls;
    if (text !== undefined) el.textContent = text;
    return el;
  }

  function renderFace(unit, face, label) {
    const block = createEl("div", "face-block");
    block.appendChild(createEl("div", "face-title", label));

    if (unit.touchscreen) {
      block.appendChild(createEl("div", "face-summary face-status-skip",
        "Skipped (Touchscreen enabled)"));
      return { el: block, failed: 0, skipped: true };
    }

    const rows = unit[face];
    let failedRows = 0;

    rows.forEach((row, rIndex) => {
      block.appendChild(createEl("div", "row-title", `Row ${rIndex + 1}`));

      const rowCells = createEl("div", "row-cells");
      let rowFail = false;
      let rowUntested = false;

      row.forEach(state => {
        let cls = "cell";
        let text = state;

        if (state === "PASS") cls += " cell-pass";
        else if (state === "FAIL") { cls += " cell-fail"; rowFail = true; }
        else { cls += " cell-un"; text = "- - -"; rowUntested = true; }

        rowCells.appendChild(createEl("div", cls, text));
      });

      if (rowFail) {
        rowCells.classList.add("row-fail");
        failedRows++;
      } else if (rowUntested) {
        rowCells.classList.add("row-skip");
      } else {
        rowCells.classList.add("row-pass");
      }

      block.appendChild(rowCells);
    });

    block.appendChild(
      createEl(
        "div",
        "face-summary " + (failedRows > 0 ? "face-status-issues" : "face-status-ok"),
        failedRows > 0 ? `${failedRows} failed row(s)` : "0 failed rows"
      )
    );

    return { el: block, failed: failedRows, skipped: false };
  }

  function renderReport() {
    const unitsContainer = document.getElementById("unitsContainer");
    let totalFailed = 0;
    let totalSkipped = 0;

    fullData.forEach((u, idx) => {
      const unitBlock = createEl("div", "unit-block");
      unitBlock.appendChild(createEl("div", "unit-title", UHC_NAMES[idx]));

      const facesRow = createEl("div", "faces-row");

      const front = renderFace(u, "front", "Front");
      const back  = renderFace(u, "back",  "Back");

      facesRow.appendChild(front.el);
      facesRow.appendChild(back.el);

      unitBlock.appendChild(facesRow);
      unitsContainer.appendChild(unitBlock);

      totalFailed += front.failed + back.failed;
      totalSkipped += (front.skipped ? 1 : 0) + (back.skipped ? 1 : 0);
    });

    document.getElementById("overallSummary").innerHTML = `
      <div><strong>Total UHCs:</strong> 3</div>
      <div><strong>Total Faces:</strong> 6</div>
      <div><strong>Total Faces Skipped:</strong> ${totalSkipped}</div>
      <div><strong>Total Failed Rows:</strong> ${totalFailed}</div>
      <div><strong>Overall Status:</strong> ${totalFailed > 0 ? "Issues Found" : "All Clear"}</div>
    `;
  }

  renderReport();

  document.getElementById("backBtn").onclick = () => {
    window.history.back();
  };

  document.getElementById("newTestBtn").onclick = () => {
    sessionStorage.clear();
    window.location.href = "index.html";
  };

  document.getElementById("pdfBtn").onclick = () => {
    window.print();
  };
</script>

</body>
</html>
