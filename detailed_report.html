<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Detailed Report</title>

<style>
  body {
    margin: 0;
    padding: 20px;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  h1, h2 {
    text-align: center;
    margin-bottom: 10px;
  }

  .summaryBox {
    background: #000;
    border: 2px solid #00ff00;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 30px;
    box-shadow: 0 0 12px #00ff00;
  }

  .summaryRow {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 16px;
  }

  .summaryLabel {
    color: #7CFC00;
  }

  .summaryValue {
    font-weight: bold;
  }

  .uhcContainer {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .uhcBox {
    background: #000;
    border: 2px solid #00ff00;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 0 12px #00ff00;
  }

  .uhcTitle {
    font-size: 20px;
    margin-bottom: 12px;
    color: #7CFC00;
    text-align: center;
  }

  .faceRow {
    display: flex;
    justify-content: space-between;
    gap: 20px;
  }

  .faceCol {
    flex: 1;
    background: #111;
    border-radius: 8px;
    padding: 12px;
    border: 1px dashed #ffff55;
  }

  .faceHeader {
    font-size: 18px;
    margin-bottom: 10px;
    color: #ffff55;
    text-align: center;
  }

  .rowBlock {
    background: #000;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
    border: 1px dashed #ffff55;
  }

  .rowTitle {
    font-size: 14px;
    margin-bottom: 6px;
    color: #7CFC00;
  }

  .ledLine {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
  }

  .ledLabel {
    color: #ffff55;
  }

  .ledValue {
    font-weight: bold;
  }

  .reportActions {
    display: flex;
    gap: 14px;
    margin-top: 40px;
  }

  .reportActions button {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 14px #00ff00;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .reportActions button:active {
    transform: scale(0.97);
  }

  @media print {
    .reportActions {
      display: none;
    }
    body {
      background: #000;
      color: #fff;
    }
  }
</style>
</head>

<body>

<h1>UHC Detailed Report</h1>
<h2 id="storeInfo"></h2>
<h2 id="dateInfo"></h2>

<div class="summaryBox" id="summaryBox"></div>

<div class="uhcContainer" id="uhcContainer"></div>

<div class="reportActions">
  <button id="downloadPdfBtn">Download PDF</button>
  <button id="newTestBtn">New Test</button>
</div>

<script>
  const fullData = JSON.parse(sessionStorage.getItem("uhcFullData") || "[]");
  const storeName = sessionStorage.getItem("storeName") || "";
  const storeNumber = sessionStorage.getItem("storeNumber") || "";
  const dateString = sessionStorage.getItem("dateString") || "";

  document.getElementById("storeInfo").textContent =
    `${storeName} — ${storeNumber}`;
  document.getElementById("dateInfo").textContent = dateString;

  const summaryBox = document.getElementById("summaryBox");
  const uhcContainer = document.getElementById("uhcContainer");

  const totalUnits = fullData.length;
  const totalFaces = totalUnits * 2;
  let skipped = 0;
  let failedRows = 0;

  fullData.forEach(unit => {
    if (unit.touchscreen) skipped++;

    unit.front.forEach(row => {
      if (row.includes("FAIL")) failedRows++;
    });
    unit.back.forEach(row => {
      if (row.includes("FAIL")) failedRows++;
    });
  });

  const status = failedRows === 0 ? "PASS" : "FAIL";

  summaryBox.innerHTML = `
    <div class="summaryRow">
      <div class="summaryLabel">Total UHCs:</div>
      <div class="summaryValue">${totalUnits}</div>
    </div>
    <div class="summaryRow">
      <div class="summaryLabel">Total Faces:</div>
      <div class="summaryValue">${totalFaces}</div>
    </div>
    <div class="summaryRow">
      <div class="summaryLabel">Touchscreen Skipped:</div>
      <div class="summaryValue">${skipped}</div>
    </div>
    <div class="summaryRow">
      <div class="summaryLabel">Failed Rows:</div>
      <div class="summaryValue">${failedRows}</div>
    </div>
    <div class="summaryRow">
      <div class="summaryLabel">Status:</div>
      <div class="summaryValue" style="color:${status === "PASS" ? "#00ff00" : "#ff0000"}">${status}</div>
    </div>
  `;

  fullData.forEach((unit, index) => {
    const box = document.createElement("div");
    box.className = "uhcBox";

    box.innerHTML = `<div class="uhcTitle">Unit ${index + 1}</div>`;

    const faceRow = document.createElement("div");
    faceRow.className = "faceRow";

    const frontCol = document.createElement("div");
    frontCol.className = "faceCol";
    frontCol.innerHTML = `<div class="faceHeader">Front</div>`;

    unit.front.forEach((row, rIndex) => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "rowBlock";
      rowDiv.innerHTML = `<div class="rowTitle">Row ${rIndex + 1}</div>`;

      row.forEach((val, cIndex) => {
        const line = document.createElement("div");
        line.className = "ledLine";
        line.innerHTML = `
          <div class="ledLabel">LED ${cIndex + 1}</div>
          <div class="ledValue">${val}</div>
        `;
        rowDiv.appendChild(line);
      });

      frontCol.appendChild(rowDiv);
    });

    const backCol = document.createElement("div");
    backCol.className = "faceCol";
    backCol.innerHTML = `<div class="faceHeader">Back</div>`;

    unit.back.forEach((row, rIndex) => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "rowBlock";
      rowDiv.innerHTML = `<div class="rowTitle">Row ${rIndex + 1}</div>`;

      row.forEach((val, cIndex) => {
        const line = document.createElement("div");
        line.className = "ledLine";
        line.innerHTML = `
          <div class="ledLabel">LED ${cIndex + 1}</div>
          <div class="ledValue">${val}</div>
        `;
        rowDiv.appendChild(line);
      });

      backCol.appendChild(rowDiv);
    });

    faceRow.appendChild(frontCol);
    faceRow.appendChild(backCol);
    box.appendChild(faceRow);
    uhcContainer.appendChild(box);
  });

  document.getElementById("downloadPdfBtn").onclick = () => {
    window.print();
  };

  document.getElementById("newTestBtn").onclick = () => {
    window.location.href = "index.html";
  };
</script>

</body>
</html>
