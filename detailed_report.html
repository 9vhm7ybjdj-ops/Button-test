<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Detailed Report</title>

<style>
  body {
    margin: 0;
    padding: 20px;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  h1, h2 {
    text-align: center;
    margin-bottom: 10px;
  }

  .section {
    background: #222;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: inset 0 0 10px rgba(0,255,0,0.2);
  }

  .unit-block {
    margin-bottom: 20px;
    padding: 14px;
    background: #1a1a1a;
    border-radius: 8px;
    box-shadow: inset 0 0 8px rgba(0,255,0,0.15);
  }

  .unit-title {
    font-size: 18px;
    margin-bottom: 8px;
    color: #7CFC00;
  }

  .row-block {
    margin-bottom: 10px;
    padding: 10px;
    background: #000;
    border-radius: 6px;
  }

  .row-title {
    font-size: 14px;
    margin-bottom: 6px;
  }

  .led-line {
    display: flex;
    gap: 12px;
    margin-bottom: 4px;
  }

  .led-label {
    width: 60px;
  }

  .led-value {
    font-weight: bold;
  }

  /* BUTTONS */
  .reportActions {
    display: flex;
    gap: 14px;
    margin-top: 30px;
  }

  .reportActions button {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 14px #00ff00;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .reportActions button:active {
    transform: scale(0.97);
  }

  @media print {
    .reportActions {
      display: none;
    }
    body {
      background: #fff;
      color: #000;
    }
    .section, .unit-block, .row-block {
      box-shadow: none;
      background: #fff;
      color: #000;
    }
  }
</style>
</head>

<body>

<h1>UHC Detailed Report</h1>
<h2 id="storeInfo"></h2>
<h2 id="dateInfo"></h2>

<div id="reportContainer"></div>

<div class="reportActions">
  <button id="downloadPdfBtn">Download PDF</button>
  <button id="newTestBtn">New Test</button>
</div>

<script>
  const fullData = JSON.parse(sessionStorage.getItem("uhcFullData") || "[]");
  const storeName = sessionStorage.getItem("storeName") || "";
  const storeNumber = sessionStorage.getItem("storeNumber") || "";
  const dateString = sessionStorage.getItem("dateString") || "";

  document.getElementById("storeInfo").textContent =
    `${storeName} — ${storeNumber}`;

  document.getElementById("dateInfo").textContent = dateString;

  const container = document.getElementById("reportContainer");

  fullData.forEach((unit, index) => {
    const unitDiv = document.createElement("div");
    unitDiv.className = "unit-block";

    unitDiv.innerHTML = `<div class="unit-title">Unit ${index + 1}</div>`;

    // FRONT
    const frontDiv = document.createElement("div");
    frontDiv.className = "section";
    frontDiv.innerHTML = `<h3>Front</h3>`;
    unit.front.forEach((row, rIndex) => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "row-block";
      rowDiv.innerHTML = `<div class="row-title">Row ${rIndex + 1}</div>`;

      row.forEach((val, cIndex) => {
        const line = document.createElement("div");
        line.className = "led-line";
        line.innerHTML = `
          <div class="led-label">LED ${cIndex + 1}</div>
          <div class="led-value">${val}</div>
        `;
        rowDiv.appendChild(line);
      });

      frontDiv.appendChild(rowDiv);
    });

    // BACK
    const backDiv = document.createElement("div");
    backDiv.className = "section";
    backDiv.innerHTML = `<h3>Back</h3>`;
    unit.back.forEach((row, rIndex) => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "row-block";
      rowDiv.innerHTML = `<div class="row-title">Row ${rIndex + 1}</div>`;

      row.forEach((val, cIndex) => {
        const line = document.createElement("div");
        line.className = "led-line";
        line.innerHTML = `
          <div class="led-label">LED ${cIndex + 1}</div>
          <div class="led-value">${val}</div>
        `;
        rowDiv.appendChild(line);
      });

      backDiv.appendChild(rowDiv);
    });

    unitDiv.appendChild(frontDiv);
    unitDiv.appendChild(backDiv);
    container.appendChild(unitDiv);
  });

  /* BUTTON LOGIC */
  document.getElementById("downloadPdfBtn").onclick = () => {
    window.print(); // iOS Safari → Save as PDF
  };

  document.getElementById("newTestBtn").onclick = () => {
    window.location.href = "index.html"; // Change if your start page is different
  };
</script>

</body>
</html>
