<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>UHC Graphical Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* Diagnostic grid stays full size */
html, body {
  margin: 0;
  padding: 0;
  background: #0b0b0d;

  background-image:
    linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
  background-size: 34px 34px;

  color: #f5f5f7;
  font-family: system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
}

/* UI shrink wrapper (10%) */
#uiScale {
  transform: scale(0.90);
  transform-origin: top center;
  width: 100%;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-size: 1.15rem;
  text-transform: uppercase;
  margin-top: 10px;
  margin-bottom: 6px;
  text-align: center;
  line-height: 1.25;
}

#storeLine {
  font-size: 0.85rem;
  margin-top: -2px;
  color: #c0c2c7;
  text-align: center;
}

#timeLine {
  font-size: 0.75rem;
  margin-top: -2px;
  margin-bottom: 10px;
  color: #a0a4b0;
  text-align: center;
}

.panel, .total-panel, .input-block {
  background: linear-gradient(145deg, #2a2c31 0%, #1a1b1f 40%, #0f1013 100%);
  border: 1px solid #3a3c42;
  padding: 12px;
  border-radius: 8px;
  width: 90%;
  max-width: 380px;
  min-width: 380px;
  text-align: center;
  margin: 10px 0;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.6);
}

.total-panel {
  background: linear-gradient(160deg, #3a3c42 0%, #1f2024 50%, #121316 100%);
  border: 1px solid #4a4c52;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}

.panel-title, .total-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: #d7d7d9;
}

.bar-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 6px;
}

.bar-label {
  font-size: 0.85rem;
  color: #c0c2c7;
  width: 60px;
  text-align: right;
}

.bar {
  font-size: 1.35rem;
  letter-spacing: 2px;
  user-select: none;
}

.legend {
  margin: 10px 0;
  font-size: 0.85rem;
  color: #a0a4b0;
  display: flex;
  justify-content: center;
  gap: 14px;
  width: 90%;
  max-width: 380px;
}

/* Cost Settings panel */
.input-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 10px;
  text-align: center;
}

label {
  font-size: 0.75rem;
  margin-bottom: 2px;
  color: #a0a4b0;
}

/* Slider shrink WITHOUT shrinking panel width */
input[type="range"] {
  transform: scale(0.70);
  transform-origin: left center;
  width: 140%;
  height: 16px;
  margin: -4px 0;
}

.slider-value {
  font-size: 0.75rem;
  color: #c0c2c7;
  text-align: right;
  margin-top: -6px;
  margin-bottom: 6px;
}

/* Buttons row */
.btn-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  width: 100%;
  margin-bottom: 20px;
}

.btn {
  width: 140px;
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 7px;

  background: #111;
  color: #7CFC00;

  border: 2px solid #00ff00;
  text-shadow: 0 0 5px #00ff00;
  box-shadow: 0 0 10px #00ff00;

  cursor: pointer;
}

.btn:active {
  transform: scale(0.97);
}
</style>
</head>
<body>

<div id="uiScale">

<div id="captureArea">

<h1>
  UHC Button<br>
  Fail Report
</h1>

<div id="storeLine"></div>
<div id="timeLine"></div>

<div class="total-panel">
  <div class="total-title">All UHC Total</div>

  <div class="bar-row">
    <div class="bar-label">Front</div>
    <div id="t_f_bar" class="bar"></div>
  </div>

  <div class="bar-row">
    <div class="bar-label">Back</div>
    <div id="t_b_bar" class="bar"></div>
  </div>

  <div id="t_summary"></div>
</div>

<div class="legend">
  <span>🟩 1 fail</span>
  <span>🟨 2 fails</span>
  <span>🟧 3–4 fails</span>
  <span>🟥 5–6 fails</span>
</div>

<div class="panel">
  <div class="panel-title">Left UHC</div>
  <div class="bar-row"><div class="bar-label">Front</div><div id="l_f_bar" class="bar"></div></div>
  <div class="bar-row"><div class="bar-label">Back</div><div id="l_b_bar" class="bar"></div></div>
</div>

<div class="panel">
  <div class="panel-title">Middle UHC</div>
  <div class="bar-row"><div class="bar-label">Front</div><div id="m_f_bar" class="bar"></div></div>
  <div class="bar-row"><div class="bar-label">Back</div><div id="m_b_bar" class="bar"></div></div>
</div>

<div class="panel">
  <div class="panel-title">Right UHC</div>
  <div class="bar-row"><div class="bar-label">Front</div><div id="r_f_bar" class="bar"></div></div>
  <div class="bar-row"><div class="bar-label">Back</div><div id="r_b_bar" class="bar"></div></div>
</div>

</div> <!-- END captureArea -->

<div class="input-block">
  <div class="input-title">Cost Settings</div>

  <label>Cost Per Failed Row</label>
  <input type="range" id="cost_row" min="700" max="1000" value="800" step="50">
  <div class="slider-value">Row Cost: $<span id="cost_row_val">800</span></div>

  <label>Cost Per Unit</label>
  <input type="range" id="cost_unit" min="8000" max="12000" value="8500" step="500">
  <div class="slider-value">Unit Cost: $<span id="cost_unit_val">8500</span></div>
</div>

<div class="btn-row">
  <button id="backBtn" class="btn">Back</button>
  <button id="shareBtn" class="btn">Share PNG</button>
</div>

</div> <!-- END uiScale -->

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* Store + timestamp */
document.getElementById("storeLine").textContent =
  sessionStorage.getItem("storeName") || "Store";

document.getElementById("timeLine").textContent =
  sessionStorage.getItem("dateString") || "";

/* REAL fail-count logic */
function countFails(unit) {
  if (unit.touchscreen) {
    return { front: 0, back: 0 };
  }

  function countFace(rows) {
    let fails = 0;
    rows.forEach(row => {
      if (row.includes("FAIL")) fails++;
    });
    return fails;
  }

  return {
    front: countFace(unit.front),
    back:  countFace(unit.back)
  };
}

/* Load correct data key */
const full = sessionStorage.getItem("uhcFullData");
let result;

if (full) {
  const d = JSON.parse(full);

  const L = countFails(d[0]);
  const M = countFails(d[1]);
  const R = countFails(d[2]);

  result = {
    leftFront:  L.front,
    leftBack:   L.back,
    middleFront:M.front,
    middleBack: M.back,
    rightFront: R.front,
    rightBack:  R.back
  };
} else {
  result = {
    leftFront:0, leftBack:0,
    middleFront:0, middleBack:0,
    rightFront:0, rightBack:0
  };
}

window.updateFromApp = function(data) {
  window.l_f = data.leftFront;
  window.l_b = data.leftBack;
  window.m_f = data.middleFront;
  window.m_b = data.middleBack;
  window.r_f = data.rightFront;
  window.r_b = data.rightBack;
  updateAll();
};

window.updateFromApp(result);

/* Color logic */
function colorForFails(fails) {
  if (fails >= 5) return "red";
  if (fails >= 3) return "orange";
  if (fails === 2) return "yellow";
  if (fails === 1) return "green";
  return "none";
}

/* Build bar with subtle 3D white X and no box expansion */
function buildBar(filled, color) {
  const emoji = {
    green:"🟩", yellow:"🟨", orange:"🟧", red:"🟥", none:"⬛"
  }[color];

  const glow = {
    green:"0 0 5px #00ff80",
    yellow:"0 0 5px #ffe066",
    orange:"0 0 5px #ff9933",
    red:"0 0 5px #ff3333",
    none:"none"
  }[color];

  let bar = "";
  for (let i = 1; i <= 6; i++) {
    if (i <= filled) {
      bar += `
        <span style="
          position:relative;
          display:inline-flex;
          width:1em;
          height:1em;
          align-items:center;
          justify-content:center;
          text-shadow:${glow};
        ">
          <span style="font-size:1em; line-height:1em;">${emoji}</span>
          <span style="
            position:absolute;
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:0.65em;
            font-weight:900;
            color:#fff;
            text-shadow:
              0 1px 0 #ccc,
              0 -1px 0 #ccc,
              1px 0 0 #ccc,
              -1px 0 0 #ccc,
              0 0 3px rgba(0,0,0,0.6);
          ">X</span>
        </span>`;
    } else {
      bar += "⬛";
    }
  }
  return bar;
}

function updateUnit(prefix, f, b, rowCost) {
  const frontColor = colorForFails(f);
  const backColor  = colorForFails(b);

  document.getElementById(prefix + "_f_bar").innerHTML = buildBar(f, frontColor);
  document.getElementById(prefix + "_b_bar").innerHTML = buildBar(b, backColor);

  return {
    f, b,
    frontCost: f * rowCost,
    backCost:  b * rowCost
  };
}

function updateAll() {
  const rowCost = +document.getElementById("cost_row").value;
  const unitCost = +document.getElementById("cost_unit").value;

  document.getElementById("cost_row_val").textContent = rowCost;
  document.getElementById("cost_unit_val").textContent = unitCost;

  const L = updateUnit("l", window.l_f, window.l_b, rowCost);
  const M = updateUnit("m", window.m_f, window.m_b, rowCost);
  const R = updateUnit("r", window.r_f, window.r_b, rowCost);

  const totalFront = L.f + M.f + R.f;
  const totalBack  = L.b + M.b + R.b;
  const totalFails = totalFront + totalBack;
  const totalCost  = L.frontCost + L.backCost + M.frontCost + M.backCost + R.frontCost + R.backCost;

  const frontColor = colorForFails(totalFront);
  const backColor  = colorForFails(totalBack);

  document.getElementById("t_f_bar").innerHTML = buildBar(Math.min(totalFront, 6), frontColor);
  document.getElementById("t_b_bar").innerHTML = buildBar(Math.min(totalBack, 6), backColor);

  document.getElementById("t_summary").textContent =
    `${totalFails} rows = $${totalCost.toLocaleString()}`;
}

document.querySelectorAll("input").forEach(i => i.addEventListener("input", updateAll));

updateAll();

/* Back button */
document.getElementById("backBtn").onclick = () => {
  window.location.href = "report_select.html";
};

/* Share PNG */
document.getElementById("shareBtn").onclick = async () => {
  const element = document.getElementById("captureArea");

  await new Promise(r => setTimeout(r, 200));

  const canvas = await html2canvas(element, {
    scale: 2,
    useCORS: true,
    backgroundColor: "#0b0b0d",
    logging: false
  });

  canvas.toBlob(async (blob) => {
    const file = new File([blob], "UHC_Report.png", { type: "image/png" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: "UHC Graphical Report",
        text: "Diagnostic summary"
      });
    } else {
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "UHC_Report.png";
      link.click();
    }
  }, "image/png");
};

}); // END DOMContentLoaded
</script>

</body>
</html>
