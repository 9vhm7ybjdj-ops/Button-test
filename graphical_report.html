<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Graphical Report</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    touch-action: manipulation !important;
    -webkit-user-select: none !important;
    user-select: none !important;
    overscroll-behavior: none;
  }

  /* Prevent zoom on canvas */
  canvas {
    touch-action: manipulation !important;
    -webkit-touch-callout: none !important;
  }

  #app {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header-title {
    font-size: 20px;
    font-weight: bold;
    line-height: 1.2;
  }

  .subheader {
    font-size: 14px;
    opacity: 0.8;
    margin-top: 6px;
  }

  .bar-wrapper {
    width: 90%;
    margin: 20px 0;
  }

  .bar-label {
    font-size: 16px;
    margin-bottom: 6px;
  }

  .bar {
    display: flex;
    gap: 6px;
  }

  .box {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    background: #333;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
    position: relative;
  }

  .box.pass {
    background: #00a000;
    box-shadow: 0 0 10px #00ff00;
  }

  .box.fail {
    background: #c00000;
    box-shadow: 0 0 10px #ff0000;
  }

  .box.un {
    background: #666;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
  }

  .box.skipped {
    background: orange;
    box-shadow: 0 0 10px orange;
  }

  /* X overlay */
  .box::after {
    content: "";
    position: absolute;
    width: 70%;
    height: 70%;
    top: 15%;
    left: 15%;
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0.9;
    display: none;
  }

  .box.pass::after,
  .box.fail::after {
    display: block;
    background-image: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L12 13.41l-4.89 4.88-1.41-1.41L10.59 12 4.29 5.71 5.7 4.29 12 10.59l6.29-6.3z"/></svg>');
  }

  .btn-row {
    margin-top: 30px;
    display: flex;
    gap: 40px;
  }

  button {
    padding: 10px 20px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 14px #00ff00;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>
<div id="app">

  <div class="header">
    <div class="header-title" id="titleLine1"></div>
    <div class="header-title" id="titleLine2"></div>
    <div class="subheader" id="dateLine"></div>
  </div>

  <div id="barsContainer"></div>

  <div class="btn-row">
    <button id="backBtn">Back</button>
    <button id="saveBtn">Save PNG</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/* SAFARI DOUBLE‑TAP & PINCH ZOOM BLOCKER */
document.addEventListener('touchstart', function(e) {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

document.addEventListener('dblclick', function(e) {
  e.preventDefault();
});

/* LOAD DATA */
const units = JSON.parse(sessionStorage.getItem("uhcFullData") || "[]");
const storeName = sessionStorage.getItem("storeName") || "";
const storeNumber = sessionStorage.getItem("storeNumber") || "";
const dateString = sessionStorage.getItem("dateString") || "";

/* TITLE */
document.getElementById("titleLine1").textContent = storeName;
document.getElementById("titleLine2").textContent = storeNumber;
document.getElementById("dateLine").textContent = dateString;

/* BUILD BARS */
const barsContainer = document.getElementById("barsContainer");

function createBar(label, values) {
  const wrap = document.createElement("div");
  wrap.className = "bar-wrapper";

  const lbl = document.createElement("div");
  lbl.className = "bar-label";
  lbl.textContent = label;

  const bar = document.createElement("div");
  bar.className = "bar";

  values.forEach(v => {
    const box = document.createElement("div");
    box.className = "box " + v;
    bar.appendChild(box);
  });

  wrap.appendChild(lbl);
  wrap.appendChild(bar);
  return wrap;
}

/* Convert unit data → 6 boxes */
function summarizeUnit(unit) {
  if (unit.skipped) return Array(6).fill("skipped");

  let fails = 0;
  let passes = 0;

  [...unit.front, ...unit.back].forEach(row => {
    row.forEach(cell => {
      if (cell === "FAIL") fails++;
      if (cell === "PASS") passes++;
    });
  });

  const total = fails + passes;
  const boxes = [];

  for (let i = 0; i < 6; i++) {
    if (i < fails) boxes.push("fail");
    else if (i < total) boxes.push("pass");
    else boxes.push("un");
  }

  return boxes;
}

/* Render all units */
["Left UHC", "Middle UHC", "Right UHC"].forEach((name, i) => {
  const bar = createBar(name, summarizeUnit(units[i]));
  barsContainer.appendChild(bar);
});

/* BACK BUTTON */
document.getElementById("backBtn").onclick = () => {
  window.location.href = "report_select.html";
};

/* PNG EXPORT */
document.getElementById("saveBtn").onclick = () => {
  html2canvas(document.getElementById("app")).then(canvas => {
    const link = document.createElement("a");
    link.download = "UHC_Graphical_Report.png";
    link.href = canvas.toDataURL();
    link.click();
  });
};
</script>

</body>
</html>
