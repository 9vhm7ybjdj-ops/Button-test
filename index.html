<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UHC Testing</title>
<link rel="stylesheet" href="style.css">

<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
    <div id="loadingBox">
        <div id="loadingBarOuter">
            <div id="loadingBarInner"></div>
        </div>
        <div id="loadingPercent">0%</div>
    </div>
</div>

<!-- HEADER -->
<div id="topBar">
    <select id="store">
        <option value="">Select Store</option>
        <option value="0818 - Kuluin">0818 - Kuluin</option>
        <option value="1234 - Example">1234 - Example</option>
    </select>
    <div id="mode">Loading...</div>
</div>

<!-- MAIN TEST AREA -->
<div id="unitContainer"></div>

<!-- REPORT PAGE -->
<div id="report" class="report">

    <h2 id="reportStore"></h2>
    <div id="reportTime"></div>

    <img id="pdfQR" />

    <div id="fullGridView"></div>

    <div id="totalFailures"></div>

    <!-- NEW BUTTONS -->
    <div class="reportNav">
        <button id="backToTest">Back</button>
        <button id="newTest">New Test</button>
    </div>

    <!-- PDF BUTTONS -->
    <button id="pdfBtn" onclick="generatePDF()">Download PDF</button>
    <button id="sharePdfBtn" onclick="sharePDF()">Share PDF</button>

</div>

<script src="script.js"></script>
</body>
</html>
