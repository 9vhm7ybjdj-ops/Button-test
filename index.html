<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Button Test</title>

<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* Container for badge + overlays */
  .badge-wrapper {
    position: relative;
    width: 320px;   /* Adjust if your PNG is a different size */
  }

  /* The actual badge image */
  .badge-img {
    width: 100%;
    display: block;
  }

  /* Version label — top-right corner */
  .version-label {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 14px;
    font-family: 'LCDMono', monospace;
    color: #7CFC00;
    text-shadow:
      0 0 6px #7CFC00,
      0 0 12px #4cff00,
      0 0 18px #2aff00;
    animation: lcdFlicker 2s infinite;
  }

  /* Loading bar positioned inside the gap */
  .loading-bar {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 78px; /* Adjust to match your PNG’s gap */
    width: 65%;
    height: 8px;
    background: #222;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 10px #00ff00;
  }

  .loading-fill {
    width: 0%;
    height: 100%;
    background: #00ff00;
    box-shadow: 0 0 10px #00ff00;
    animation: loadAnim 3s forwards;
  }

  /* Flicker animation */
  @keyframes lcdFlicker {
    0%, 100% { opacity: 1; }
    45% { opacity: 0.85; }
    50% { opacity: 0.55; }
    55% { opacity: 0.92; }
    70% { opacity: 0.78; }
  }

  /* Loading animation */
  @keyframes loadAnim {
    from { width: 0%; }
    to   { width: 100%; }
  }
</style>
</head>

<body>

  <div class="badge-wrapper">
    <img src="IMG_4088.png" class="badge-img">

    <div class="version-label">v1.0.0</div>

    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>
  </div>

</body>
</html>
