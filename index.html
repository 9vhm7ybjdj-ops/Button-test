<head>
  <meta charset="UTF-8">
  <title>UHC Button Test</title>

  <!-- html2pdf.js (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
  body {
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  #root {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .shell {
    width: 100%;
    max-width: 480px;
    padding: 16px;
  }

  .body {
    width: 100%;
  }

  .top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  select {
    padding: 6px;
    border-radius: 6px;
  }

  .faceWrap {
    width: 100%;
  }

  .face {
    background: #222;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 0 10px #000;
  }

  .row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .btn {
    width: 30%;
    padding: 14px 0;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    background: #333;
    box-shadow: 0 0 6px #000;
  }

  .pass { background: #004d00; border: 2px solid #00ff00; }
  .fail { background: #4d0000; border: 2px solid #ff4444; }
  .un   { background: #444;    border: 2px solid #888; }

  .passRow { background: rgba(0,255,0,0.15); }
  .failRow { background: rgba(255,0,0,0.15); }

  .skipBox {
    margin-top: 12px;
  }

  .navBtns {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
  }

  button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }

  .darkButton {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: #333;
    color: #fff;
    border-radius: 10px;
    font-size: 16px;
  }

  .report {
    display: none;
    padding: 16px;
  }

  .reportTitle {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 6px;
    text-align: center;
  }

  .storeLine {
    font-size: 16px;
    margin-bottom: 6px;
    text-align: center;
  }

  .timestamp {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 20px;
    text-align: center;
  }

  /* SUMMARY PAGE */

  #summaryView {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .summaryCard {
    width: 90%;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
    text-align: center;
    color: #fff;
    box-shadow: 0 0 10px #000;
  }

  .summaryPASS { background: #0a4f0a; border: 2px solid #00ff00; }
  .summarySKIPPED { background: #6a5f00; border: 2px solid #ffff66; }
  .summaryFAIL { background: #5a0000; border: 2px solid #ff4444; }

  .summaryCard img {
    width: 48px;
    height: 48px;
    margin-bottom: 8px;
  }

  .summaryTitle {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .summaryText {
    font-size: 14px;
    opacity: 0.9;
  }

  .summaryButtons {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .summaryButtons button {
    width: 80%;
    margin-top: 12px;
  }

  /* FULL GRID */

  #fullGridView {
    display: none;
  }

  .unitRow {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .reportFace {
    width: 48%;
    background: #222;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 0 8px #000;
  }

  .gridRowWrapper {
    margin-bottom: 6px;
  }

  .gridRowInner {
    display: flex;
    justify-content: space-between;
  }

  .cell {
    width: 30%;
    padding: 10px 0;
    text-align: center;
    border-radius: 6px;
    background: #333;
  }

  .passText { color: #00ff00; }
  .failText { color: #ff4444; }
  .unText   { color: #aaa; }

  /* PDF‑ONLY OVERRIDES */
  .pdfPage {
    width: 100%;
    background: #111;
    padding: 20px;
  }

  /* PDF / SHARE BUTTONS (CONTROLLED BY JS) */
  #pdfBtn,
  #sharePdfBtn {
    display: none;
  }
  </style>
</head>
<body>
  <div id="root">
    <div class="shell">
      <div class="body">

        <div class="top">
          <div>
            Store:
            <select id="store">
              <option value="">Select Store</option>
              <option>0818 - Kuluin</option>
              <option>0892 - Nambour</option>
              <option>0981 - Maroochydore</option>
              <option>1614 - Sippy Downs</option>
            </select>
          </div>
          <span id="mode">Mode</span>
        </div>

        <!-- Dynamic testing screens -->
        <div id="unitContainer"></div>

        <!-- Report container (summary + grid injected here) -->
        <div id="report" class="report"></div>

        <!-- PDF actions (shown only on report screen, Safari only) -->
        <button id="pdfBtn" class="darkButton" onclick="downloadPDF()">
          Download PDF
        </button>

        <button id="sharePdfBtn" class="darkButton" onclick="sharePDF()">
          Share PDF
        </button>

      </div>
    </div>
  </div>

  <!-- JS below -->
</body>
<script>
/* ---------------------------------------------------------
   DATA + CORE STATE
--------------------------------------------------------- */

function makeFace() {
  return Array.from({length:6}, () => ["UN","UN","UN"]);
}

const units = {
  1:{skip:false,front:makeFace(),back:makeFace()},
  2:{skip:false,front:makeFace(),back:makeFace()},
  3:{skip:false,front:makeFace(),back:makeFace()}
};

let currentScreen = 0;

/* ---------------------------------------------------------
   RENDER TESTING SCREENS
--------------------------------------------------------- */

function renderScreen() {
  const c = document.getElementById("unitContainer");
  const r = document.getElementById("report");
  const m = document.getElementById("mode");

  c.innerHTML = "";
  r.style.display = "none";

  // Hide PDF / Share buttons when not on report
  const pdfBtn = document.getElementById("pdfBtn");
  const shareBtn = document.getElementById("sharePdfBtn");
  if (pdfBtn) pdfBtn.style.display = "none";
  if (shareBtn) shareBtn.style.display = "none";

  if (currentScreen === 6) {
    m.textContent = "Report";
    buildReport();
    r.style.display = "block";
    return;
  }

  const u = Math.floor(currentScreen/2)+1;
  const f = currentScreen%2===0 ? "front" : "back";
  const l = f==="front" ? "Front Face" : "Back Face";

  m.textContent = `Testing ${l} (Unit ${u})`;

  const unit = units[u];

  const wrap = document.createElement("div");
  wrap.className = "faceWrap";

  const face = document.createElement("div");
  face.className = "face";

  const title = document.createElement("h3");
  title.textContent = `Unit ${u} — ${l}`;
  face.appendChild(title);

  if (unit.skip) {
    const skipMsg = document.createElement("div");
    skipMsg.textContent = "SKIPPED";
    face.appendChild(skipMsg);
  } else {
    const rows = unit[f];

    rows.forEach((row,rIndex)=>{
      const rowDiv = document.createElement("div");
      rowDiv.className = "row";

      const p = row.filter(v=>v==="PASS").length;
      const fC = row.filter(v=>v==="FAIL").length;

      if (fC>0) rowDiv.classList.add("failRow");
      else if (p===3) rowDiv.classList.add("passRow");

      row.forEach((val,cIndex)=>{
        const btn = document.createElement("div");
        btn.className = "btn";

        if (val==="PASS") btn.classList.add("pass");
        else if (val==="FAIL") btn.classList.add("fail");
        else btn.classList.add("un");

        btn.textContent = val==="UN" ? "- - -" : val;

        btn.onclick = ()=>{
          const now = units[u][f][rIndex][cIndex];
          let next = now==="UN" ? "PASS" : now==="PASS" ? "FAIL" : "UN";
          units[u][f][rIndex][cIndex] = next;
          renderScreen();
        };

        rowDiv.appendChild(btn);
      });

      face.appendChild(rowDiv);
    });
  }

  const skipBox = document.createElement("div");
  skipBox.className = "skipBox";

  const skipCheck = document.createElement("input");
  skipCheck.type = "checkbox";
  skipCheck.checked = unit.skip;
  skipCheck.onchange = ()=>{
    unit.skip = skipCheck.checked;
    renderScreen();
  };

  skipBox.appendChild(skipCheck);
  skipBox.appendChild(document.createTextNode(" Skip entire unit"));
  face.appendChild(skipBox);

  const nav = document.createElement("div");
  nav.className = "navBtns";

  const backBtn = document.createElement("button");
  backBtn.textContent = "Back";
  backBtn.disabled = currentScreen===0;
  backBtn.onclick = ()=>{
    currentScreen--;
    renderScreen();
  };

  const nextBtn = document.createElement("button");
  nextBtn.textContent = currentScreen===5 ? "Finish" : "Next";
  nextBtn.onclick = ()=>{
    currentScreen++;
    renderScreen();
  };

  nav.appendChild(backBtn);
  nav.appendChild(nextBtn);
  face.appendChild(nav);

  wrap.appendChild(face);
  c.appendChild(wrap);
}

/* ---------------------------------------------------------
   REPORT GENERATION
--------------------------------------------------------- */

function buildReport() {
  const r = document.getElementById("report");
  r.innerHTML = "";

  const t = document.createElement("div");
  t.className = "reportTitle";
  t.textContent = "UHC Button Test Report";

  const storeName = document.getElementById("store").value || "No Store Selected";

  const st = document.createElement("div");
  st.className = "storeLine";
  st.textContent = storeName;

  const s = document.createElement("div");
  s.className = "timestamp";
  s.textContent = new Date().toLocaleString();

  r.appendChild(t);
  r.appendChild(st);
  r.appendChild(s);

  const summary = document.createElement("div");
  summary.id = "summaryView";

  for (let u = 1; u <= 3; u++) {

    let fFail = 0;
    let bFail = 0;

    if (!units[u].skip) {
      units[u].front.forEach(row => { if (row.includes("FAIL")) fFail++; });
      units[u].back.forEach(row => { if (row.includes("FAIL")) bFail++; });
    }

    let status = "";
    let icon = "";
    let text = "";

    if (units[u].skip) {
      status = "SKIPPED";
      icon = "skipped.png";
      text = "Front: SKIPPED<br>Back: SKIPPED";
    } else if (fFail === 0 && bFail === 0) {
      status = "PASS";
      icon = "pass.png";
      text = "All Passed";
    } else {
      status = "FAIL";
      icon = "fail.png";
      text = `${fFail} Front Failed<br>${bFail} Back Failed`;
    }

    const card = document.createElement("div");
    card.className = `summaryCard summary${status}`;

    card.innerHTML = `
      <div class="summaryTitle">Unit ${u}</div>
      <img src="${icon}">
      <div class="summaryTitle">${status}</div>
      <div class="summaryText">${text}</div>
    `;

    summary.appendChild(card);
  }

  const btnWrap = document.createElement("div");
  btnWrap.className = "summaryButtons";

  const viewBtn = document.createElement("button");
  viewBtn.className = "darkButton";
  viewBtn.textContent = "View Full Grid";
  viewBtn.onclick = showFullGrid;
  btnWrap.appendChild(viewBtn);

  const backBtn = document.createElement("button");
  backBtn.className = "darkButton";
  backBtn.textContent = "Back";
  backBtn.onclick = () => {
    currentScreen = 5;
    renderScreen();
  };
  btnWrap.appendChild(backBtn);

  const resetBtn = document.createElement("button");
  resetBtn.className = "darkButton";
  resetBtn.textContent = "New Test";
  resetBtn.onclick = () => {
    localStorage.clear();
    location.reload();
  };
  btnWrap.appendChild(resetBtn);

  summary.appendChild(btnWrap);
  r.appendChild(summary);

  /* FULL GRID */

  const full = document.createElement("div");
  full.id = "fullGridView";

  const g = document.createElement("div");
  g.className = "reportGrid";

  for (let u = 1; u <= 3; u++) {

    const row = document.createElement("div");
    row.className = "unitRow";

    ["front", "back"].forEach(f => {

      const f2 = document.createElement("div");
      f2.className = "reportFace";

      const h = document.createElement("div");
      h.className = "sectionHeader";
      h.textContent = `Unit ${u} — ${f === "front" ? "Front Face" : "Back Face"}`;
      f2.appendChild(h);

      if (units[u].skip) {
        const sk = document.createElement("div");
        sk.textContent = "SKIPPED";
        f2.appendChild(sk);
      } else {
        const rows = units[u][f];

        rows.forEach(rowData => {
          const w = document.createElement("div");
          w.className = "gridRowWrapper";

          const p = rowData.filter(v => v === "PASS").length;
          const fC = rowData.filter(v => v === "FAIL").length;

          if (fC > 0) w.classList.add("failRow");
          else if (p === 3) w.classList.add("passRow");

          const i = document.createElement("div");
          i.className = "gridRowInner";

          rowData.forEach(v => {
            const c = document.createElement("div");
            c.className = "cell";

            if (v === "PASS") c.classList.add("passText");
            else if (v === "FAIL") c.classList.add("failText");
            else c.classList.add("unText");

            c.textContent = v === "UN" ? "- - -" : v;
            i.appendChild(c);
          });

          w.appendChild(i);
          f2.appendChild(w);
        });
      }

      row.appendChild(f2);
    });

    g.appendChild(row);
  }

  full.appendChild(g);

  const backBtn2 = document.createElement("button");
  backBtn2.className = "darkButton";
  backBtn2.textContent = "Back to Summary";
  backBtn2.onclick = showSummary;

  full.appendChild(backBtn2);

  r.appendChild(full);

  // Show PDF / Share buttons on report screen (Safari / supported browsers)
  const pdfBtn = document.getElementById("pdfBtn");
  const shareBtn = document.getElementById("sharePdfBtn");
  if (pdfBtn) pdfBtn.style.display = "block";
  if (shareBtn) shareBtn.style.display = "block";
}

function showSummary() {
  document.getElementById("summaryView").style.display = "block";
  document.getElementById("fullGridView").style.display = "none";
}

function showFullGrid() {
  document.getElementById("summaryView").style.display = "none";
  document.getElementById("fullGridView").style.display = "block";
}

/* ---------------------------------------------------------
   INITIAL RENDER
--------------------------------------------------------- */

renderScreen();

/* ---------------------------------------------------------
   PDF EXPORT
--------------------------------------------------------- */

function downloadPDF() {
  const report = document.getElementById("report");

  const opt = {
    margin:       0,
    filename:     'UHC_Button_Test_Report.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, backgroundColor: "#111" },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(report).save();
}

/* ---------------------------------------------------------
   SHARE PDF (NATIVE SHARE SHEET WHERE SUPPORTED)
--------------------------------------------------------- */

async function sharePDF() {
  const report = document.getElementById("report");

  const opt = {
    margin:       0,
    filename:     'UHC_Button_Test_Report.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, backgroundColor: "#111" },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  // Generate PDF as Blob
  const pdfBlob = await html2pdf().set(opt).from(report).output('blob');

  const file = new File(
    [pdfBlob],
    "UHC_Button_Test_Report.pdf",
    { type: "application/pdf" }
  );

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({
      title: "UHC Button Test Report",
      text: "PDF Report",
      files: [file]
    });
  } else {
    alert("Sharing is not supported on this device or browser.");
  }
}

/* ---------------------------------------------------------
   EDGE ON iOS DETECTION — HIDE PDF / SHARE BUTTONS
--------------------------------------------------------- */

function isEdgeOniOS() {
  return /EdgiOS/i.test(navigator.userAgent);
}

window.addEventListener("DOMContentLoaded", () => {
  if (isEdgeOniOS()) {
    const pdfBtn = document.getElementById("pdfBtn");
    const shareBtn = document.getElementById("sharePdfBtn");
    if (pdfBtn) pdfBtn.style.display = "none";
    if (shareBtn) shareBtn.style.display = "none";
  }
});
</script>
