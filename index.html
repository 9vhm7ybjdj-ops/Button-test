<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Test Loader</title>
<link rel="apple-touch-icon" href="icon.PNG">

<style>
  /* GLOBAL BACKGROUND (GRID BEHIND EVERYTHING) */
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    overflow: hidden;

    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* CRT flicker */
  @keyframes crtFlicker {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    13%  { opacity: 0.3; }
    16%  { opacity: 1; }
    20%  { opacity: 0.6; }
    25%  { opacity: 1; }
    100% { opacity: 1; }
  }

  /* Scanline sweep */
  @keyframes scanSweep {
    0%   { top: -100%; opacity: 0.15; }
    100% { top: 200%; opacity: 0; }
  }

  .scanline {
    position: absolute;
    left: 0;
    width: 100%;
    height: 40px;
    background: linear-gradient(to bottom, rgba(0,255,0,0.15), rgba(0,255,0,0));
    animation: scanSweep 1.4s linear forwards;
    pointer-events: none;
  }

  /* LOADER SCREEN */
  #loaderScreen {
    width: 100%;
    height: 100vh;
    position: absolute;
    top: 0; left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.6s ease;
  }

  /* PANEL */
  .panel {
    width: 300px;
    padding: 26px 0;
    background: rgba(20,20,20,0.75); /* translucent so grid shows through */
    border-radius: 14px;
    animation: crtFlicker 0.6s ease-out;

    box-shadow:
      0 0 22px rgba(0,255,0,0.35),
      0 0 0 2px rgba(0,255,0,0.4),
      inset 2px 2px 4px rgba(255,255,255,0.06),
      inset -2px -2px 6px rgba(0,0,0,0.7);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 18px;
    position: relative;

    min-height: 200px;
    backdrop-filter: blur(2px);
  }

  .title {
    font-size: 26px;
    font-weight: bold;
    color: #7CFC00;
    text-shadow: 0 0 6px #00ff00;
    text-align: center;
  }

  /* LOADING BAR */
  .loadingBarOuter {
    width: 240px;
    height: 16px;
    background: #0d0d0d;
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      inset 0 0 10px rgba(0,255,0,0.25),
      0 0 12px rgba(0,255,0,0.25);
    margin-left: auto;
    margin-right: auto;
  }

  @keyframes pulseGlow {
    0%   { box-shadow: 0 0 8px #00ff00; }
    50%  { box-shadow: 0 0 14px #00ff00; }
    100% { box-shadow: 0 0 8px #00ff00; }
  }

  .loadingBarInner {
    width: 0%;
    height: 100%;
    background:
      repeating-linear-gradient(
        to right,
        #00ff00,
        #00ff00 12px,
        #009900 12px,
        #009900 16px
      );
    animation: pulseGlow 1.2s infinite ease-in-out;
    transition: width 1.5s ease;
  }

  /* INITIALIZING + BOOT COMPLETE TEXT */
  .initializingText,
  .bootComplete {
    height: 18px;
    font-size: 14px;
    letter-spacing: 2px;
    text-shadow: 0 0 6px #00ff00;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    text-align: center;
  }

  .initializingText {
    color: #7CFC00;
    opacity: 0.8;
    animation: initPulse 1.4s infinite ease-in-out;
  }

  @keyframes initPulse {
    0%   { opacity: 0.4; }
    50%  { opacity: 1; }
    100% { opacity: 0.4; }
  }

  .bootComplete {
    color: #00ff00;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .bootComplete.show {
    opacity: 1;
  }

  /* START SCREEN */
  #startScreen {
    width: 100%;
    height: 100vh;
    background: rgba(17,17,17,0.6); /* translucent */
    backdrop-filter: blur(2px);
    position: absolute;
    top: 0; left: 0;
    opacity: 0;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.6s ease;
  }

  #startScreen.active {
    opacity: 1;
    pointer-events: auto;
  }

  .startBox {
    width: 90%;
    max-width: 360px;
    background: rgba(34,34,34,0.7); /* translucent */
    backdrop-filter: blur(2px);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(0,255,0,0.4);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  label {
    font-size: 14px;
    opacity: 0.9;
  }

  select, button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #333;
    color: #fff;
    font-size: 16px;
  }

  button {
    background: #111;
    border: 2px solid #00ff00;
    color: #7CFC00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loaderScreen">
  <div class="panel">
    <div class="scanline"></div>

    <div class="title">UHC TEST v2.0</div>

    <div class="loadingBarOuter">
      <div class="loadingBarInner" id="loadingBar"></div>
    </div>

    <div class="initializingText" id="initText">SYSTEM INITIALIZING…</div>

    <div class="bootComplete" id="bootDone">BOOT SEQUENCE COMPLETE</div>
  </div>
</div>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="startBox">

    <label for="storeSelect">Store</label>
    <select id="storeSelect">
      <option value="">Select Store…</option>
      <option value="Kuluin — 0818">Kuluin — 0818</option>
      <option value="Nambour — 0892">Nambour — 0892</option>
      <option value="Maroochydore — 0981">Maroochydore — 0981</option>
      <option value="Sippy Downs — 1614">Sippy Downs — 1614</option>
    </select>

    <button id="startBtn">Start Test</button>
  </div>
</div>

<script>
  // Fill loading bar
  setTimeout(() => {
    document.getElementById("loadingBar").style.width = "100%";
  }, 200);

  // After loading finishes, show boot complete
  setTimeout(() => {
    document.getElementById("initText").style.visibility = "hidden";
    document.getElementById("bootDone").classList.add("show");
  }, 1800);

  // Fade out loader → show start screen
  setTimeout(() => {
    loaderScreen.style.opacity = 0;
    setTimeout(() => {
      loaderScreen.style.display = "none";
      startScreen.classList.add("active");
    }, 600);
  }, 2600);

  // Start button
  document.getElementById("startBtn").onclick = () => {
    const store = document.getElementById("storeSelect").value;

    if (!store) {
      alert("Please select a store");
      return;
    }

    const [storeName, storeNumber] = store.split(" — ");

    window.location.href =
      `app.html?store=${encodeURIComponent(storeName)}&num=${storeNumber}`;
  };
</script>

</body>
</html>
