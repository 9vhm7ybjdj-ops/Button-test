<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UHC Button Test Report</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #eee;
  }

  #root {
    width: 900px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
  }

  .shell {
    margin: 0 auto;
    width: 100%;
  }

  .body {
    background: #2b2b2b;
    border-radius: 10px;
    padding: 12px;
    position: relative;
    box-shadow: inset 0 0 10px #000;
  }

  .top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 12px;
  }

  .top select {
    background: #111;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 3px 6px;
  }

  #unitContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .unitTitle {
    text-align: center;
    font-size: 18px;
    margin-bottom: 10px;
    font-weight: bold;
  }

  .faceWrap {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .face {
    background: #111;
    border-radius: 8px;
    padding: 12px;
    box-shadow: inset 0 0 8px #000;
    width: 80%;
  }

  .face h3 {
    text-align: center;
    margin-top: 0;
    margin-bottom: 14px;
    font-size: 14px;
  }

  .row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 20px 0;
    padding: 8px 0;
    transition: box-shadow 0.15s;
  }

  .row.passRow {
    box-shadow: 0 0 20px #00ff00;
  }

  .row.failRow {
    box-shadow: 0 0 20px #ff0000;
  }

  .btn {
    width: 70px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #2a2a2a;
    color: #ccc;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: .15s;
    box-shadow: inset 0 0 4px #000;

    font-family: 'Consolas', 'Courier New', monospace;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow:
      0 0 6px currentColor,
      0 0 12px currentColor,
      0 0 20px currentColor;
  }

  .btn.pass { background: #003000; border-color: #0f0; color: #00ff00; }
  .btn.fail { background: #300000; border-color: #f00; color: #ff4444; }
  .btn.un   { background: #333;    border-color: #777; color: #ffff66; }

  .btn.pass.active { box-shadow: 0 0 8px #0f0; }
  .btn.fail.active { box-shadow: 0 0 8px #f00; }
  .btn.un.active   { box-shadow: 0 0 8px #ff0; }

  .skipBox {
    margin: 10px 0;
    font-size: 13px;
  }

  .navBtns {
    display: flex;
    justify-content: space-between;
    width: 80%;
    margin-top: 20px;
  }

  .navBtns button {
    background: #1c1c1c;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  .navBtns button:disabled {
    opacity: .4;
    cursor: default;
  }

  .report {
    display: none;
    margin-top: 20px;
  }

  .reportTitle {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .timestamp {
    text-align: center;
    font-size: 11px;
    opacity: .8;
    margin-bottom: 20px;
  }

  .reportGrid {
    display: grid;
    grid-template-columns: 45% 45%;
    justify-content: center;
    gap: 30px 20px;
  }

  .reportFace {
    background: #1a1a1a;
    padding: 12px;
    border-radius: 8px;
    box-shadow: inset 0 0 8px #000;
  }

  .sectionHeader {
    font-size: 15px;
    font-weight: bold;
    margin: 14px 0 10px 0;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border: 2px solid #555;
  }

  .gridRowWrapper {
    display: block;
    margin: 18px 0;
    padding: 12px 0;
  }

  .gridRowWrapper.passRow {
    box-shadow: 0 0 20px #00ff00;
  }

  .gridRowWrapper.failRow {
    box-shadow: 0 0 20px #ff0000;
  }

  .gridRowInner {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  .cell {
    border: 2px solid #555;
    padding: 8px 0;
    text-align: center;
    font-size: 13px;

    font-family: 'Consolas', 'Courier New', monospace;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow:
      0 0 6px currentColor,
      0 0 12px currentColor,
      0 0 20px currentColor;
  }

  .passText { color: #00ff00; }
  .failText { color: #ff4444; }
  .unText   { color: #ffff66; opacity: .85; }

  .skippedText {
    text-align: center;
    color: #ffff66;
    text-shadow: 0 0 6px #ff0;
    margin: 10px 0;
    font-weight: bold;
  }

  #pdfBtn {
    background: #1c1c1c;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 10px;
    display: none;
  }

  @media print {
    @page { size: A4 landscape; margin: 0; }

    body {
      background: #fff !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    #unitContainer, .top, #pdfBtn {
      display: none !important;
    }

    #report {
      display: block !important;
      transform: scale(0.55);
      transform-origin: top center;
      width: 100%;
    }
  }
</style>
</head>

<body>

<div id="root">
  <div class="shell">
    <div class="body">

      <div class="top">
        <div>
          Store:
          <select id="store">
            <option value="">Select Store</option>
            <option>0818 - Kuluin</option>
            <option>0892 - Nambour</option>
            <option>0981 - Maroochydore</option>
            <option>1614 - Sippy Downs</option>
          </select>
        </div>
        <span id="mode">Mode</span>
      </div>

      <div id="unitContainer"></div>

      <button id="pdfBtn">Download PDF</button>

      <div id="report" class="report"></div>

    </div>
  </div>
</div>

<script>
function makeFace() {
  let r = [];
  for (let i = 0; i < 6; i++) {
    r.push(["UN","UN","UN"]);
  }
  return r;
}

const units = {
  1: { skip:false, front:makeFace(), back:makeFace() },
  2: { skip:false, front:makeFace(), back:makeFace() },
  3: { skip:false, front:makeFace(), back:makeFace() }
};

let currentScreen = 0;

function renderScreen() {
  const c = document.getElementById("unitContainer");
  const r = document.getElementById("report");
  const p = document.getElementById("pdfBtn");
  const m = document.getElementById("mode");

  c.innerHTML = "";
  r.style.display = "none";
  p.style.display = "none";

  if (currentScreen === 6) {
    m.textContent = "Report";
    buildReport();
    r.style.display = "block";
    p.style.display = "block";
    return;
  }

  const u = Math.floor(currentScreen / 2) + 1;
  const f = currentScreen % 2 === 0 ? "front" : "back";
  const l = f === "front" ? "Front Face" : "Back Face";

  m.textContent = `Testing ${l} (Unit ${u})`;

  const unit = units[u];

  const wrap = document.createElement("div");
  wrap.className = "faceWrap";

  const face = document.createElement("div");
  face.className = "face";

  const title = document.createElement("h3");
  title.textContent = `Unit ${u} — ${l}`;
  face.appendChild(title);

  if (unit.skip) {
    const skipMsg = document.createElement("div");
    skipMsg.className = "skippedText";
    skipMsg.textContent = "SKIPPED";
    face.appendChild(skipMsg);
  } else {
    const rows = unit[f];

    rows.forEach((row, rIndex) => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "row";

      const passCount = row.filter(v => v === "PASS").length;
      const failCount = row.filter(v => v === "FAIL").length;

      if (failCount > 0) rowDiv.classList.add("failRow");
      else if (passCount === 3) rowDiv.classList.add("passRow");

      row.forEach((val, cIndex) => {
        const btn = document.createElement("div");
        btn.className = "btn";

        if (val === "PASS") btn.classList.add("pass","active");
        else if (val === "FAIL") btn.classList.add("fail","active");
        else btn.classList.add("un","active");

        btn.textContent = val;

        btn.onclick = () => {
          const now = units[u][f][rIndex][cIndex];
          let next;
          if (now === "UN") next = "PASS";
          else if (now === "PASS") next = "FAIL";
          else next = "UN";

          units[u][f][rIndex][cIndex] = next;
          renderScreen();
        };

        rowDiv.appendChild(btn);
      });

      face.appendChild(rowDiv);
    });
  }

  const skipBox = document.createElement("div");
  skipBox.className = "skipBox";

  const skipCheck = document.createElement("input");
  skipCheck.type = "checkbox";
  skipCheck.checked = unit.skip;
  skipCheck.onchange = () => {
    unit.skip = skipCheck.checked;
    renderScreen();
  };

  skipBox.appendChild(skipCheck);
  skipBox.appendChild(document.createTextNode(" Skip entire unit"));

  face.appendChild(skipBox);

  const nav = document.createElement("div");
  nav.className = "navBtns";

  const backBtn = document.createElement("button");
  backBtn.textContent = "Back";
  backBtn.disabled = currentScreen === 0;
  backBtn.onclick = () => {
    currentScreen--;
    renderScreen();
  };

  const nextBtn = document.createElement("button");
  nextBtn.textContent = currentScreen === 5 ? "Finish" : "Next";
  nextBtn.onclick = () => {
    currentScreen++;
    renderScreen();
  };

  nav.appendChild(backBtn);
  nav.appendChild(nextBtn);

  face.appendChild(nav);

  wrap.appendChild(face);
  c.appendChild(wrap);
}

function buildReport() {
  const r = document.getElementById("report");
  r.innerHTML = "";

  const t = document.createElement("div");
  t.className = "reportTitle";
  t.textContent = "UHC Button Test Report";

  const s = document.createElement("div");
  s.className = "timestamp";
  s.textContent = new Date().toLocaleString();

  r.appendChild(t);
  r.appendChild(s);

  const g = document.createElement("div");
  g.className = "reportGrid";

  for (let u = 1; u <= 3; u++) {
    ["front","back"].forEach(f => {
      const f2 = document.createElement("div");
      f2.className = "reportFace";

      const h = document.createElement("div");
      h.className = "sectionHeader";
      h.textContent = `Unit ${u} — ${f === "front" ? "Front Face" : "Back Face"}`;
      f2.appendChild(h);

      if (units[u].skip) {
        const sk = document.createElement("div");
        sk.className = "skippedText";
        sk.textContent = "SKIPPED";
        f2.appendChild(sk);
      } else {
        const rows = units[u][f];

        rows.forEach(row => {
          const w = document.createElement("div");
          w.className = "gridRowWrapper";

          const p = row.filter(v => v === "PASS").length;
          const fC = row.filter(v => v === "FAIL").length;

          if (fC > 0) w.classList.add("failRow");
          else if (p === 3) w.classList.add("passRow");

          const i = document.createElement("div");
          i.className = "gridRowInner";

          row.forEach(v => {
            const c = document.createElement("div");
            c.className = "cell";

            if (v === "PASS") c.classList.add("passText");
            else if (v === "FAIL") c.classList.add("failText");
            else c.classList.add("unText");

            c.textContent = v;
            i.appendChild(c);
          });

          w.appendChild(i);
          f2.appendChild(w);
        });
      }

      g.appendChild(f2);
    });
  }

  r.appendChild(g);
}

document.getElementById("pdfBtn").onclick = () => {
  window.print();
};

renderScreen();
</script>

</body>
</html>
