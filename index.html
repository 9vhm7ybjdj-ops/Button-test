<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Button Test</title>

<style>
  body {
    margin: 0;
    background: #000;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #7CFC00;
  }

  /* ---------------- LOADING SCREEN ---------------- */

  #loadingScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    z-index: 9999;
  }

  .badge-wrapper {
    position: relative;
    width: 320px;
  }

  .badge-img {
    width: 100%;
    display: block;
  }

  .version-label {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 14px;
    font-family: monospace;
    color: #7CFC00;
    text-shadow:
      0 0 6px #7CFC00,
      0 0 12px #4cff00,
      0 0 18px #2aff00;
    animation: lcdFlicker 2s infinite;
  }

  .loading-bar {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 100px; /* ✔ EXACT POSITION */
    width: 65%;
    height: 8px;
    background: #222;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 10px #00ff00;
  }

  .loading-fill {
    width: 0%;
    height: 100%;
    background: #00ff00;
    box-shadow: 0 0 10px #00ff00;
    animation: loadAnim 3s forwards;
  }

  @keyframes lcdFlicker {
    0%, 100% { opacity: 1; }
    45% { opacity: 0.85; }
    50% { opacity: 0.55; }
    55% { opacity: 0.92; }
    70% { opacity: 0.78; }
  }

  @keyframes loadAnim {
    from { width: 0%; }
    to   { width: 100%; }
  }

  /* ---------------- STORE SELECT SCREEN ---------------- */

  #storeSelectScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 80px;
  }

  select {
    padding: 12px;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid #00ff00;
    background: #111;
    color: #7CFC00;
    box-shadow: 0 0 10px #00ff00;
  }

  button {
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 6px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }
</style>
</head>

<body>

<!-- ---------------- LOADING SCREEN ---------------- -->
<div id="loadingScreen">
  <div class="badge-wrapper">
    <img src="IMG_4088.png" class="badge-img">
    <div class="version-label">v1.0.0</div>

    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>
  </div>
</div>

<!-- ---------------- STORE SELECT SCREEN ---------------- -->
<div id="storeSelectScreen">

  <select id="storeDropdown">
    <option value="">Select Store</option>
    <option value="0818 - Kuluin">0818 - Kuluin</option>
    <option value="0892 - Nambour">0892 - Nambour</option>
    <option value="0981 - Maroochydore">0981 - Maroochydore</option>
    <option value="1614 - Sippy Downs">1614 - Sippy Downs</option>
  </select>

  <button id="startBtn">Start Test</button>
</div>

<script>
  /* ⭐ NO SOUND */

  /* After loading animation completes, show store select */
  setTimeout(() => {
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("storeSelectScreen").style.display = "flex";
  }, 3000);

  /* Start Test button */
  document.getElementById("startBtn").onclick = () => {
    const val = document.getElementById("storeDropdown").value;
    if (!val) return;

    const [num, name] = val.split(" - ");

    window.location.href =
      `app.html?store=${encodeURIComponent(name)}&num=${encodeURIComponent(num)}`;
  };
</script>

</body>
</html>
