<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Button Test</title>

<style>
  body {
    margin: 0;
    background: #000;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Fullscreen loading screen */
  #loadingScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    z-index: 9999;
  }

  .badge-wrapper {
    position: relative;
    width: 320px;
  }

  .badge-img {
    width: 100%;
    display: block;
  }

  .version-label {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 14px;
    font-family: monospace;
    color: #7CFC00;
    text-shadow:
      0 0 6px #7CFC00,
      0 0 12px #4cff00,
      0 0 18px #2aff00;
    animation: lcdFlicker 2s infinite;
  }

  .loading-bar {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 110px;
    width: 65%;
    height: 8px;
    background: #222;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 10px #00ff00;
  }

  .loading-fill {
    width: 0%;
    height: 100%;
    background: #00ff00;
    box-shadow: 0 0 10px #00ff00;
    animation: loadAnim 3s forwards;
  }

  @keyframes lcdFlicker {
    0%, 100% { opacity: 1; }
    45% { opacity: 0.85; }
    50% { opacity: 0.55; }
    55% { opacity: 0.92; }
    70% { opacity: 0.78; }
  }

  @keyframes loadAnim {
    from { width: 0%; }
    to   { width: 100%; }
  }

  /* Store selection screen */
  #storeSelectScreen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 20px;
    box-sizing: border-box;
    z-index: 9999;
  }

  #storeSelectScreen input {
    width: 80%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
  }

  #startTestBtn {
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 6px;
    border: none;
    background: #00ff00;
    color: #000;
    cursor: pointer;
  }
</style>
</head>

<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="badge-wrapper">
    <img src="IMG_4088.png" class="badge-img">
    <div class="version-label">v1.0.0</div>
    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>
  </div>
</div>

<!-- Store Selection Screen -->
<div id="storeSelectScreen">
  <h2>Select Store</h2>

  <input id="storeNameInput" type="text" placeholder="Store Name">
  <input id="storeNumberInput" type="text" placeholder="Store Number">

  <button id="startTestBtn">Start Test</button>
</div>

<script>
  // After loading bar completes, show store selection
  setTimeout(() => {
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("storeSelectScreen").style.display = "flex";
  }, 3000);

  // Start Test button → redirect with parameters
  document.getElementById("startTestBtn").onclick = () => {
    const store = document.getElementById("storeNameInput").value.trim();
    const num   = document.getElementById("storeNumberInput").value.trim();

    if (!store || !num) {
      alert("Please enter both store name and store number");
      return;
    }

    window.location.href =
      `app.html?store=${encodeURIComponent(store)}&num=${encodeURIComponent(num)}`;
  };
</script>

</body>
</html>
