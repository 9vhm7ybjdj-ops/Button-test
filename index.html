<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Store Select</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    padding-top: 40px;
  }

  #app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }

  .header {
    font-size: 22px;
    font-weight: bold;
  }

  .sub {
    opacity: 0.8;
    margin-bottom: 10px;
  }

  select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #555;
    background: #222;
    color: #fff;
    font-size: 16px;
  }

  button {
    padding: 12px 20px;
    background: #2b6cb0;
    border: 1px solid #777;
    border-radius: 6px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.98);
  }
</style>
</head>

<body>
<div id="app">
  <div class="header">UHC Test</div>
  <div class="sub">Select store to begin</div>

  <select id="storeSelect">
    <option value="">Select Store</option>
    <option value="Kuluin|0818">Kuluin – 0818</option>
    <option value="Nambour|0892">Nambour – 0892</option>
    <option value="Maroochydore|0981">Maroochydore – 0981</option>
    <option value="Sippy Downs|1614">Sippy Downs – 1614</option>
  </select>

  <button id="startBtn">Start</button>
</div>

<script>
  document.getElementById("startBtn").onclick = () => {
    const val = document.getElementById("storeSelect").value;
    if (!val) return;

    const [store, num] = val.split("|");

    // Redirect to app.html with URL parameters
    window.location.href = `app.html?store=${encodeURIComponent(store)}&num=${encodeURIComponent(num)}`;
  };
</script>

</body>
</html>
