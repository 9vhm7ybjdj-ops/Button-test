<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>UHC Loader</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------------------- LOADING SCREEN ---------------------- */

  #loadingScreen {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #logoWrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 100px; /* ⭐ EXACT GAP YOU REQUESTED */
  }

  #badgeLogo {
    width: 260px;
    height: auto;
    filter:
      drop-shadow(0 0 6px #00ff00)
      drop-shadow(0 0 12px #00ff00);
    animation: flicker 2.4s infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 0.92; }
    94% { opacity: 0.85; }
    96% { opacity: 0.95; }
  }

  #progressBar {
    width: 260px;
    height: 10px;
    background: #222;
    border-radius: 6px;
    overflow: hidden;
  }

  #progressFill {
    width: 0%;
    height: 100%;
    background: #00ff00;
    box-shadow: 0 0 10px #00ff00;
    transition: width 1.5s linear;
  }

  /* ---------------------- STORE SELECT SCREEN ---------------------- */

  #storeSelectScreen {
    display: none;
    flex-direction: column;
    gap: 20px;
    text-align: center;
  }

  select {
    padding: 12px;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid #00ff00;
    background: #111;
    color: #7CFC00;
    box-shadow: 0 0 10px #00ff00;
  }

  button {
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 6px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }
</style>
</head>

<body>

<!-- ---------------------- LOADING SCREEN ---------------------- -->
<div id="loadingScreen">
  <div id="logoWrapper">
    <img src="IMG_4088.png" id="badgeLogo">
  </div>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>
</div>

<!-- ---------------------- STORE SELECT SCREEN ---------------------- -->
<div id="storeSelectScreen">
  <h2>Select Store</h2>

  <select id="storeDropdown">
    <option value="">Select Store</option>
    <option value="0818 - Kuluin">0818 - Kuluin</option>
    <option value="0892 - Nambour">0892 - Nambour</option>
    <option value="0981 - Maroochydore">0981 - Maroochydore</option>
    <option value="1614 - Sippy Downs">1614 - Sippy Downs</option>
  </select>

  <button id="startBtn">Start Test</button>
</div>

<script>
  const loadingScreen = document.getElementById("loadingScreen");
  const storeScreen   = document.getElementById("storeSelectScreen");
  const progressFill  = document.getElementById("progressFill");
  const dropdown      = document.getElementById("storeDropdown");
  const startBtn      = document.getElementById("startBtn");

  /* ⭐ Animate loading bar */
  setTimeout(() => {
    progressFill.style.width = "100%";
  }, 100);

  /* ⭐ After animation, show store select */
  setTimeout(() => {
    loadingScreen.style.display = "none";
    storeScreen.style.display = "flex";
  }, 1600);

  /* ⭐ Start Test button */
  startBtn.onclick = () => {
    const val = dropdown.value;
    if (!val) return;

    const [num, name] = val.split(" - ");

    window.location.href =
      `app.html?store=${encodeURIComponent(name)}&num=${encodeURIComponent(num)}`;
  };
</script>

</body>
</html>
