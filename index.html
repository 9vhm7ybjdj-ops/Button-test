<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UHC Button Test Report</title>

<!-- Home Screen Icon + iOS App Mode -->
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
  body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #eee;
  }

  #root {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
  }

  .shell {
    width: 100%;
  }

  .body {
    background: #2b2b2b;
    border-radius: 10px;
    padding: 10px;
    box-shadow: inset 0 0 10px #000;
  }

  .top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 12px;
  }

  .top select {
    background: #111;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 3px 6px;
  }

  #unitContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .faceWrap {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .face {
    background: #111;
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    box-shadow: inset 0 0 8px #000;
  }

  .face h3 {
    text-align: center;
    margin: 0 0 12px 0;
    font-size: 14px;
  }

  .row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 14px 0;
    padding: 6px 0;
    transition: box-shadow 0.15s;
  }

  .row.passRow { box-shadow: 0 0 14px #00ff00; }
  .row.failRow { box-shadow: 0 0 14px #ff0000; }

  .btn {
    width: 70px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #2a2a2a;
    color: #ccc;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: inset 0 0 4px #000;
    font-family: Consolas, monospace;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .btn.pass { background: #003000; border-color: #0f0; color: #00ff00; }
  .btn.fail { background: #300000; border-color: #f00; color: #ff4444; }
  .btn.un   { background: #333;    border-color: #777; color: #ffff66; }

  .skipBox {
    margin: 10px 0;
    font-size: 13px;
  }

  .navBtns {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
  }

  .navBtns button {
    background: #1c1c1c;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  .report {
    display: none;
    margin-top: 20px;
  }

  .reportTitle {
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .storeLine {
    text-align: center;
    font-size: 13px;
    margin-bottom: 6px;
    opacity: .9;
  }

  .failSummary {
    text-align: center;
    font-size: 13px;
    margin-bottom: 6px;
    color: #ff4444;
    font-weight: bold;
  }

  .timestamp {
    text-align: center;
    font-size: 11px;
    opacity: .8;
    margin-bottom: 14px;
  }

  /* 2×3 Report Layout */
  .reportGrid {
    display: grid;
    grid-template-columns: 45% 45%;
    justify-content: center;
    gap: 30px 20px;
  }

  .reportFace {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 8px;
    box-shadow: inset 0 0 8px #000;
  }

  .sectionHeader {
    font-size: 14px;
    font-weight: bold;
    margin: 10px 0;
    text-align: center;
  }

  .gridRowWrapper {
    margin: 12px 0;
    padding: 10px 0;
  }

  .gridRowWrapper.passRow { box-shadow: 0 0 14px #00ff00; }
  .gridRowWrapper.failRow { box-shadow: 0 0 14px #ff0000; }

  .gridRowInner {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  .cell {
    border: 2px solid #555;
    padding: 6px 0;
    text-align: center;
    font-size: 12px;
    font-family: Consolas, monospace;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .passText { color: #00ff00; }
  .failText { color: #ff4444; }
  .unText   { color: #ffff66; opacity: .85; }

  .reportNav {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
  }

  .reportNav button {
    background: #1c1c1c;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  /* Loading Screen */
  #loadingScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity .4s ease;
  }

  .loadingIcon {
    width: 120px;
    height: 120px;
    margin-bottom: 20px;
  }

  .loadingText {
    color: #eee;
    font-size: 16px;
    font-weight: bold;
    opacity: .8;
  }

  /* Neon Loading Bar */
  .loadingBar {
    width: 70%;
    height: 6px;
    background: #222;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 10px #0f0;
    margin-top: 20px;
  }

  .loadingFill {
    width: 0%;
    height: 100%;
    background: #00ff00;
    box-shadow: 0 0 12px #00ff00, 0 0 20px #00ff00;
    animation: loadAnim 5s ease-out forwards;
  }

  @keyframes loadAnim {
    0%   { width: 0%;   opacity: 0.4; }
    20%  { width: 25%;  opacity: 1; }
    50%  { width: 55%;  opacity: 1; }
    80%  { width: 85%;  opacity: 1; }
    100% { width: 100%; opacity: 1; }
  }

  /* PRINT MODE — SINGLE PAGE FIX */
  @media print {
    @page {
      size: A4 landscape;
      margin: 0;
    }

    body {
      background: #fff !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    #loadingScreen,
    #unitContainer,
    .top {
      display: none !important;
    }

    #report {
      display: block !important;
      width: 100vw !important;
      height: 100vh !important;
      transform: scale(0.92);
      transform-origin: top left;
      padding: 0 !important;
      margin: 0 !important;
    }

    .reportGrid {
      gap: 10px 10px !important;
    }

    .reportFace {
      padding: 6px !important;
    }

    .gridRowWrapper {
      margin: 6px 0 !important;
      padding: 6px 0 !important;
    }

    .cell {
      padding: 4px 0 !important;
      font-size: 10px !important;
    }

    .sectionHeader {
      margin: 4px 0 !important;
      font-size: 12px !important;
    }

    .reportNav {
      display: none !important;
    }
  }
</style>
</head>

<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <img src="icon.png" class="loadingIcon">
  <div class="loadingText">Loading…</div>
  <div class="loadingBar"><div class="loadingFill"></div></div>
</div>

<div id="root">
  <div class="shell">
    <div class="body">

      <div class="top">
        <div>
          Store:
          <select id="store">
            <option value="">Select Store</option>
            <option>0818 - Kuluin</option>
            <option>0892 - Nambour</option>
            <option>0981 - Maroochydore</option>
            <option>1614 - Sippy Downs</option>
          </select>
        </div>
        <span id="mode">Mode</span>
      </div>

      <div id="unitContainer"></div>

      <div id="report" class="report"></div>

    </div>
  </div>
</div>

<script>
function makeFace() {
  return Array.from({length:6},()=>["UN","UN","UN"]);
}

const units = {
  1:{skip:false,front:makeFace(),back:makeFace()},
  2:{skip:false,front:makeFace(),back:makeFace()},
  3:{skip:false,front:makeFace(),back:makeFace()}
};

let currentScreen = 0;

function renderScreen() {
  const c = document.getElementById("unitContainer");
  const r = document.getElementById("report");
  const m = document.getElementById("mode");

  c.innerHTML = "";
  r.style.display = "none";

  if (currentScreen === 6) {
    m.textContent = "Report";
    buildReport();
    r.style.display = "block";
    return;
  }

  const u = Math.floor(currentScreen/2)+1;
  const f = currentScreen%2===0?"front":"back";
  const l = f==="front"?"Front Face":"Back Face";

  m.textContent = `Testing ${l} (Unit ${u})`;

  const unit = units[u];

  const wrap = document.createElement("div");
  wrap.className = "faceWrap";

  const face = document.createElement("div");
  face.className = "face";

  const title = document.createElement("h3");
  title.textContent = `Unit ${u} — ${l}`;
  face.appendChild(title);

  if (unit.skip) {
    const skipMsg = document.createElement("div");
    skipMsg.className = "skippedText";
    skipMsg.textContent = "SKIPPED";
    face.appendChild(skipMsg);
  } else {
    const rows = unit[f];

    rows.forEach((row,rIndex)=>{
      const rowDiv = document.createElement("div");
      rowDiv.className = "row";

      const p = row.filter(v=>v==="PASS").length;
      const fC = row.filter(v=>v==="FAIL").length;

      if (fC>0) rowDiv.classList.add("failRow");
      else if (p===3) rowDiv.classList.add("passRow");

      row.forEach((val,cIndex)=>{
        const btn = document.createElement("div");
        btn.className = "btn";

        if (val==="PASS") btn.classList.add("pass");
        else if (val==="FAIL") btn.classList.add("fail");
        else btn.classList.add("un");

        btn.textContent = val==="UN" ? "- - -" : val;

        btn.onclick = ()=>{
          const now = units[u][f][rIndex][cIndex];
          let next = now==="UN"?"PASS":now==="PASS"?"FAIL":"UN";
          units[u][f][rIndex][cIndex] = next;
          renderScreen();
        };

        rowDiv.appendChild(btn);
      });

      face.appendChild(rowDiv);
    });
  }

  const skipBox = document.createElement("div");
  skipBox.className = "skipBox";

  const skipCheck = document.createElement("input");
  skipCheck.type = "checkbox";
  skipCheck.checked = unit.skip;
  skipCheck.onchange = ()=>{
    unit.skip = skipCheck.checked;
    renderScreen();
  };

  skipBox.appendChild(skipCheck);
  skipBox.appendChild(document.createTextNode(" Skip entire unit"));
  face.appendChild(skipBox);

  const nav = document.createElement("div");
  nav.className = "navBtns";

  const backBtn = document.createElement("button");
  backBtn.textContent = "Back";
  backBtn.disabled = currentScreen===0;
  backBtn.onclick = ()=>{
    currentScreen--;
    renderScreen();
  };

  const nextBtn = document.createElement("button");
  nextBtn.textContent = currentScreen===5?"Finish":"Next";
  nextBtn.onclick = ()=>{
    currentScreen++;
    renderScreen();
  };

  nav.appendChild(backBtn);
  nav.appendChild(nextBtn);
  face.appendChild(nav);

  wrap.appendChild(face);
  c.appendChild(wrap);
}

function buildReport() {
  const r = document.getElementById("report");
  r.innerHTML = "";

  const t = document.createElement("div");
  t.className = "reportTitle";
  t.textContent = "UHC Button Test Report";

  const storeName = document.getElementById("store").value || "No Store Selected";

  const st = document.createElement("div");
  st.className = "storeLine";
  st.textContent = storeName;

  /* COUNT FAILED ROWS */
  let frontFails = 0;
  let backFails = 0;

  for (let u=1;u<=3;u++) {
    if (!units[u].skip) {
      units[u].front.forEach(row=>{
        if (row.includes("FAIL")) frontFails++;
      });
      units[u].back.forEach(row=>{
        if (row.includes("FAIL")) backFails++;
      });
    }
  }

  const fs = document.createElement("div");
  fs.className = "failSummary";
  fs.textContent = `Front Fails: ${frontFails}   |   Back Fails: ${backFails}`;

  const s = document.createElement("div");
  s.className = "timestamp";
  s.textContent = new Date().toLocaleString();

  r.appendChild(t);
  r.appendChild(st);
  r.appendChild(fs);
  r.appendChild(s);

  const g = document.createElement("div");
  g.className = "reportGrid";

  for (let u=1;u<=3;u++) {
    ["front","back"].forEach(f=>{
      const f2 = document.createElement("div");
      f2.className = "reportFace";

      const h = document.createElement("div");
      h.className = "sectionHeader";
      h.textContent = `Unit ${u} — ${f==="front"?"Front Face":"Back Face"}`;
      f2.appendChild(h);

      if (units[u].skip) {
        const sk = document.createElement("div");
        sk.className = "skippedText";
        sk.textContent = "SKIPPED";
        f2.appendChild(sk);
      } else {
        const rows = units[u][f];

        rows.forEach(row=>{
          const w = document.createElement("div");
          w.className = "gridRowWrapper";

          const p = row.filter(v=>v==="PASS").length;
          const fC = row.filter(v=>v==="FAIL").length;

          if (fC>0) w.classList.add("failRow");
          else if (p===3) w.classList.add("passRow");

          const i = document.createElement("div");
          i.className = "gridRowInner";

          row.forEach(v=>{
            const c = document.createElement("div");
            c.className = "cell";

            if (v==="PASS") c.classList.add("passText");
            else if (v==="FAIL") c.classList.add("failText");
            else c.classList.add("unText");

            c.textContent = v==="UN" ? "- - -" : v;
            i.appendChild(c);
          });

          w.appendChild(i);
          f2.appendChild(w);
        });
