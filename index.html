<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UHC Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA / iOS web app -->
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        :root {
            --bg: #000;
            --pass: #00ff5a;
            --fail: #ff0033;
            --untested: #777777;
            --text: #ffffff;
            --font-main: Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        #app {
            margin-top: 20px;
        }

        /* Interface + report containers */
        #interfacePage,
        #reportPage {
            background-color: #111;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 0 20px #000;
            min-width: 360px;
        }

        /* Scale interface up */
        #interfacePage {
            transform: scale(1.3);
            transform-origin: top center;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 3px;
        }

        .subheading {
            text-align: center;
            margin-bottom: 16px;
            font-size: 14px;
            opacity: 0.8;
        }

        /* Grid layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 200px);
            grid-template-rows: repeat(6, 70px);
            gap: 12px;
            justify-content: center;
        }

        .cell {
            border-radius: 8px;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-main);
            font-size: 22px;
            letter-spacing: 3px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
            background-color: #222;
            color: var(--text);
        }

        .cell:active {
            transform: scale(0.97);
        }

        .cell.untested {
            background-color: var(--untested);
            color: #fff;
            box-shadow: 0 0 8px #444;
        }

        .cell.pass {
            background-color: var(--pass);
            color: #000;
            box-shadow: 0 0 16px var(--pass);
        }

        .cell.fail {
            background-color: var(--fail);
            color: #000;
            box-shadow: 0 0 16px var(--fail);
        }

        .footer-controls {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: 2px solid #444;
            background-color: #222;
            color: #fff;
            font-family: var(--font-main);
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: #0066ff;
            border-color: #0066ff;
            box-shadow: 0 0 12px #0066ff;
        }

        .btn-secondary {
            background-color: #333;
        }

        /* Report page */
        #reportPage {
            display: none;
            max-width: 480px;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }

        .report-table th,
        .report-table td {
            border: 1px solid #444;
            padding: 6px 8px;
            text-align: center;
        }

        .report-table th {
            background-color: #222;
        }

        .report-actions {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .report-summary {
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- INTERFACE PAGE -->
    <div id="interfacePage">
        <h1>UHC TEST</h1>
        <div class="subheading">Tap each tray position to set: UNTESTED → PASS → FAIL</div>

        <div id="grid" class="grid"></div>

        <div class="footer-controls">
            <button id="submitBtn" class="btn btn-primary">SUBMIT</button>
        </div>
    </div>

    <!-- REPORT PAGE -->
    <div id="reportPage">
        <h2>UHC REPORT</h2>
        <div class="subheading">Summary of PASS / FAIL / UNTESTED</div>

        <table class="report-table" id="reportTable">
            <thead>
            <tr>
                <th>Position</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="reportBody">
            <!-- Filled by JS -->
            </tbody>
        </table>

        <div class="report-summary" id="reportSummary"></div>

        <div class="report-actions">
            <button id="backToInterface" class="btn btn-secondary">BACK</button>
            <button id="newTest" class="btn btn-primary">NEW TEST</button>
        </div>
    </div>
</div>

<script>
    // CONFIG
    const ROWS = 6;
    const COLS = 3;

    // STATE
    let cells = []; // { id, state }

    function positionLabel(index) {
        // 1–18, or customize to Unit/Face labels if you want
        return "Pos " + (index + 1);
    }

    function loadState() {
        const saved = localStorage.getItem("uhcState");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length === ROWS * COLS) {
                    cells = parsed;
                    return;
                }
            } catch (e) {}
        }
        // default: all UNTESTED
        cells = Array.from({ length: ROWS * COLS }, (_, i) => ({
            id: i,
            state: "UNTESTED"
        }));
    }

    function saveState() {
        localStorage.setItem("uhcState", JSON.stringify(cells));
    }

    function cycleState(current) {
        if (current === "UNTESTED") return "PASS";
        if (current === "PASS") return "FAIL";
        return "UNTESTED";
    }

    function renderGrid() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        cells.forEach((cell, index) => {
            const btn = document.createElement("div");
            btn.classList.add("cell");

            if (cell.state === "UNTESTED") {
                btn.classList.add("untested");
                btn.textContent = "UNTESTED";
            } else if (cell.state === "PASS") {
                btn.classList.add("pass");
                btn.textContent = "PASS";
            } else if (cell.state === "FAIL") {
                btn.classList.add("fail");
                btn.textContent = "FAIL";
            }

            btn.dataset.index = index;

            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.index, 10);
                const currentState = cells[idx].state;
                const nextState = cycleState(currentState);
                cells[idx].state = nextState;
                saveState();
                updateCellVisual(btn, nextState);
            });

            grid.appendChild(btn);
        });
    }

    function updateCellVisual(btn, state) {
        btn.classList.remove("untested", "pass", "fail");
        if (state === "UNTESTED") {
            btn.classList.add("untested");
            btn.textContent = "UNTESTED";
        } else if (state === "PASS") {
            btn.classList.add("pass");
            btn.textContent = "PASS";
        } else if (state === "FAIL") {
            btn.classList.add("fail");
            btn.textContent = "FAIL";
        }
    }

    function showInterface() {
        document.getElementById("interfacePage").style.display = "block";
        document.getElementById("reportPage").style.display = "none";
    }

    function showReport() {
        document.getElementById("interfacePage").style.display = "none";
        document.getElementById("reportPage").style.display = "block";
        renderReport();
    }

    function renderReport() {
        const tbody = document.getElementById("reportBody");
        const summary = document.getElementById("reportSummary");
        tbody.innerHTML = "";

        let passCount = 0;
        let failCount = 0;
        let untestedCount = 0;

        cells.forEach((cell, index) => {
            const tr = document.createElement("tr");
            const tdPos = document.createElement("td");
            const tdState = document.createElement("td");

            tdPos.textContent = positionLabel(index);
            tdState.textContent = cell.state;

            if (cell.state === "PASS") passCount++;
            else if (cell.state === "FAIL") failCount++;
            else untestedCount++;

            tr.appendChild(tdPos);
            tr.appendChild(tdState);
            tbody.appendChild(tr);
        });

        summary.textContent =
            "PASS: " + passCount +
            " | FAIL: " + failCount +
            " | UNTESTED: " + untestedCount;
    }

    function resetTest() {
        cells = Array.from({ length: ROWS * COLS }, (_, i) => ({
            id: i,
            state: "UNTESTED"
        }));
        saveState();
        renderGrid();
        showInterface();
    }

    // EVENT HOOKS
    document.getElementById("submitBtn").addEventListener("click", () => {
        showReport();
    });

    document.getElementById("backToInterface").addEventListener("click", () => {
        showInterface();
    });

    document.getElementById("newTest").addEventListener("click", () => {
        resetTest();
    });

    // INIT
    loadState();
    renderGrid();
</script>
</body>
</html>
