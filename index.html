<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

/* TRUE FULL‑SCREEN MODE (fixes iPhone Safari 100vh bug) */
:root {
  --vh: 1vh;
}

body {
  margin: 0;
  padding: 0;
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  height: calc(var(--vh) * 100);
  overflow: hidden;
}

/* MAIN LAYOUT */
.shell {
  width: 100%;
  max-width: 480px;
  height: 100%;
  padding: 8px;
  display: flex;
  flex-direction: column;
}

.body {
  display: flex;
  flex-direction: column;
  height: calc(var(--vh) * 100);
}

/* TOP BAR — compact */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  margin-bottom: 4px;
  font-size: 14px;
}

.top select {
  padding: 4px 6px;
  font-size: 14px;
  border-radius: 6px;
}

/* UNIT CONTAINER — scroll only if needed */
#unitContainer {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 10px;
}

/* FACE CONTAINER */
.faceWrap {
  flex: 1;
  display: flex;
}

.face {
  background: #222;
  padding: 8px;
  border-radius: 10px;
  box-shadow: 0 0 10px #000;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ROWS — responsive */
.row {
  display: flex;
  gap: 6px;
  margin-bottom: 4px;
}

/* DYNAMIC TOUCHSCREEN BUTTONS */
.btn {
  flex: 1;
  aspect-ratio: 1.2;
  margin: 4px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: clamp(16px, 4vw, 22px);
  border-radius: 12px;
  font-weight: bold;
  background: #333;
  box-shadow: 0 0 6px #000;
}

/* PASS / FAIL / UN STATES */
.pass { background: #004d00; border: 2px solid #00ff00; }
.fail { background: #4d0000; border: 2px solid #ff4444; }
.un   { background: #444;    border: 2px solid #888; }

/* SKIP CHECKBOX */
.skipBox {
  margin-top: 8px;
  font-size: 14px;
}

/* NAV BUTTONS */
.navBtns {
  display: flex;
  justify-content: space-between;
  margin-top: auto;
}

.navBtns button {
  padding: 12px 18px;
  font-size: 16px;
  border-radius: 10px;
  background: #333;
  color: #fff;
  border: none;
  cursor: pointer;
}

/* REPORT VIEW */
.report {
  display: none;
  padding: 12px;
  overflow-y: auto;
}

/* SUMMARY + GRID */
.summaryCard {
  width: 90%;
  border-radius: 12px;
  padding: 18px;
  margin: 10px auto;
  text-align: center;
  color: #fff;
  box-shadow: 0 0 10px #000;
}

.summaryPASS { background: #0a4f0a; border: 2px solid #00ff00; }
.summarySKIPPED { background: #6a5f00; border: 2px solid #ffff66; }
.summaryFAIL { background: #5a0000; border: 2px solid #ff4444; }

.summaryButtons button {
  width: 80%;
  margin: 10px auto;
  padding: 14px;
  background: #333;
  color: #fff;
  border-radius: 10px;
  font-size: 16px;
}

/* GRID IN REPORT */
.unitRow {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.reportFace {
  width: 48%;
  background: #222;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 0 8px #000;
}

.gridRowWrapper {
  margin-bottom: 6px;
}

.gridRowInner {
  display: flex;
  gap: 6px;
}

.cell {
  flex: 1;
  aspect-ratio: 1.2;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 6px;
  background: #333;
  font-size: clamp(14px, 3.5vw, 18px);
}

.passText { color: #00ff00; }
.failText { color: #ff4444; }
.unText   { color: #aaa; }

/* IMPROVED PDF HEADER — LEFT TEXT, RIGHT QR */
.pdfHeader {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 16px;
  margin-bottom: 20px;
  border-bottom: 1px solid #444;
}

.pdfHeaderLeft {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.pdfHeaderTitle {
  font-size: 22px;
  font-weight: bold;
}

.pdfHeaderSub {
  font-size: 14px;
  opacity: 0.8;
}

.pdfQR {
  width: 80px;
  height: 80px;
}

</style>
</head>
<body>

<div class="shell body">

  <div class="top">
    <div>
      Store:
      <select id="store">
        <option value="">Select Store</option>
        <option value="Store 1">Store 1</option>
        <option value="Store 2">Store 2</option>
        <option value="Store 3">Store 3</option>
      </select>
    </div>
    <div id="mode">Testing Front Face (Unit 1)</div>
  </div>

  <div id="unitContainer"></div>

  <div id="report" class="report">

    <div id="pdfHeader" class="pdfHeader">
      <div class="pdfHeaderLeft">
        <div class="pdfHeaderTitle"></div>
        <div class="pdfHeaderSub"></div>
      </div>
      <img class="pdfQR" src="">
    </div>

  </div>

  <button id="pdfBtn" class="darkButton" style="display:none;">Download PDF</button>
  <button id="sharePdfBtn" class="darkButton" style="display:none;">Share PDF</button>

</div>

</body>
<script>
// Fix iOS Safari 100vh bug
function updateVH() {
  document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
}
window.addEventListener('resize', updateVH);
updateVH();

/* ---------------------------------------------------------
   DATA + CORE STATE
--------------------------------------------------------- */

function makeFace() {
  return Array.from({ length: 6 }, () => ["UN", "UN", "UN"]);
}

const units = {
  1: { skip: false, front: makeFace(), back: makeFace() },
  2: { skip: false, front: makeFace(), back: makeFace() },
  3: { skip: false, front: makeFace(), back: makeFace() }
};

let currentScreen = 0;

/* ---------------------------------------------------------
   RENDER TESTING SCREENS
--------------------------------------------------------- */

function renderScreen() {
  const c = document.getElementById("unitContainer");
  const r = document.getElementById("report");
  const m = document.getElementById("mode");

  c.innerHTML = "";
  r.style.display = "none";

  document.getElementById("pdfBtn").style.display = "none";
  document.getElementById("sharePdfBtn").style.display = "none";

  if (currentScreen === 6) {
    m.textContent = "Report";
    buildReport();
    r.style.display = "block";
    return;
  }

  const u = Math.floor(currentScreen / 2) + 1;
  const f = currentScreen % 2 === 0 ? "front" : "back";
  const l = f === "front" ? "Front Face" : "Back Face";

  m.textContent = `Testing ${l} (Unit ${u})`;

  const unit = units[u];

  const wrap = document.createElement("div");
  wrap.className = "faceWrap";

  const face = document.createElement("div");
  face.className = "face";

  const title = document.createElement("h3");
  title.textContent = `Unit ${u} — ${l}`;
  face.appendChild(title);

  if (unit.skip) {
    const skipMsg = document.createElement("div");
    skipMsg.textContent = "SKIPPED";
    face.appendChild(skipMsg);
  } else {
    const rows = unit[f];

    rows.forEach((row, rIndex) => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "row";

      const p = row.filter(v => v === "PASS").length;
      const fC = row.filter(v => v === "FAIL").length;

      if (fC > 0) rowDiv.classList.add("failRow");
      else if (p === 3) rowDiv.classList.add("passRow");

      row.forEach((val, cIndex) => {
        const btn = document.createElement("div");
        btn.className = "btn";

        if (val === "PASS") btn.classList.add("pass");
        else if (val === "FAIL") btn.classList.add("fail");
        else btn.classList.add("un");

        btn.textContent = val === "UN" ? "- - -" : val;

        btn.onclick = () => {
          const now = units[u][f][rIndex][cIndex];
          let next = now === "UN" ? "PASS" : now === "PASS" ? "FAIL" : "UN";
          units[u][f][rIndex][cIndex] = next;
          renderScreen();
        };

        rowDiv.appendChild(btn);
      });

      face.appendChild(rowDiv);
    });
  }

  const skipBox = document.createElement("div");
  skipBox.className = "skipBox";

  const skipCheck = document.createElement("input");
  skipCheck.type = "checkbox";
  skipCheck.checked = unit.skip;
  skipCheck.onchange = () => {
    unit.skip = skipCheck.checked;
    renderScreen();
  };

  skipBox.appendChild(skipCheck);
  skipBox.appendChild(document.createTextNode(" Skip entire unit"));
  face.appendChild(skipBox);

  const nav = document.createElement("div");
  nav.className = "navBtns";

  const backBtn = document.createElement("button");
  backBtn.textContent = "Back";
  backBtn.disabled = currentScreen === 0;
  backBtn.onclick = () => {
    currentScreen--;
    renderScreen();
  };

  const nextBtn = document.createElement("button");
  nextBtn.textContent = currentScreen === 5 ? "Finish" : "Next";
  nextBtn.onclick = () => {
    currentScreen++;
    renderScreen();
  };

  nav.appendChild(backBtn);
  nav.appendChild(nextBtn);
  face.appendChild(nav);

  wrap.appendChild(face);
  c.appendChild(wrap);
}

/* ---------------------------------------------------------
   REPORT GENERATION
--------------------------------------------------------- */

function buildReport() {
  const r = document.getElementById("report");

  document.getElementById("summaryView")?.remove();
  document.getElementById("fullGridView")?.remove();

  const pdfHeader = document.getElementById("pdfHeader");
  const storeName = document.getElementById("store").value || "No Store Selected";
  const timestamp = new Date().toLocaleString();
  const qrURL = generateQR("https://9vhm7ybjdj-ops.github.io/Button-test/");

  pdfHeader.querySelector(".pdfHeaderTitle").textContent = storeName;
  pdfHeader.querySelector(".pdfHeaderSub").textContent = timestamp;
  pdfHeader.querySelector(".pdfQR").src = qrURL;

  const summary = document.createElement("div");
  summary.id = "summaryView";

  for (let u = 1; u <= 3; u++) {
    let fFail = 0;
    let bFail = 0;

    if (!units[u].skip) {
      units[u].front.forEach(row => { if (row.includes("FAIL")) fFail++; });
      units[u].back.forEach(row => { if (row.includes("FAIL")) bFail++; });
    }

    let status = "";
    let icon = "";
    let text = "";

    if (units[u].skip) {
      status = "SKIPPED";
      icon = "skipped.png";
      text = "Front: SKIPPED<br>Back: SKIPPED";
    } else if (fFail === 0 && bFail === 0) {
      status = "PASS";
      icon = "pass.png";
      text = "All Passed";
    } else {
      status = "FAIL";
      icon = "fail.png";
      text = `${fFail} Front Failed<br>${bFail} Back Failed`;
    }

    const card = document.createElement("div");
    card.className = `summaryCard summary${status}`;

    card.innerHTML = `
      <div class="summaryTitle">Unit ${u}</div>
      <img src="${icon}">
      <div class="summaryTitle">${status}</div>
      <div class="summaryText">${text}</div>
    `;

    summary.appendChild(card);
  }

  const btnWrap = document.createElement("div");
  btnWrap.className = "summaryButtons";

  const viewBtn = document.createElement("button");
  viewBtn.className = "darkButton";
  viewBtn.textContent = "View Full Grid";
  viewBtn.onclick = showFullGrid;
  btnWrap.appendChild(viewBtn);

  const backBtn = document.createElement("button");
  backBtn.className = "darkButton";
  backBtn.textContent = "Back";
  backBtn.onclick = () => {
    currentScreen = 5;
    renderScreen();
  };
  btnWrap.appendChild(backBtn);

  const resetBtn = document.createElement("button");
  resetBtn.className = "darkButton";
  resetBtn.textContent = "New Test";
  resetBtn.onclick = () => {
    localStorage.clear();
    location.reload();
  };
  btnWrap.appendChild(resetBtn);

  summary.appendChild(btnWrap);
  r.appendChild(summary);

  const full = document.createElement("div");
  full.id = "fullGridView";

  const g = document.createElement("div");
  g.className = "reportGrid";

  for (let u = 1; u <= 3; u++) {
    const row = document.createElement("div");
    row.className = "unitRow";

    ["front", "back"].forEach(f => {
      const f2 = document.createElement("div");
      f2.className = "reportFace";

      const h = document.createElement("div");
      h.className = "sectionHeader";
      h.textContent = `Unit ${u} — ${f === "front" ? "Front Face" : "Back Face"}`;
      f2.appendChild(h);

      if (units[u].skip) {
        const sk = document.createElement("div");
        sk.textContent = "SKIPPED";
        f2.appendChild(sk);
      } else {
        const rows = units[u][f];

        rows.forEach(rowData => {
          const w = document.createElement("div");
          w.className = "gridRowWrapper";

          const p = rowData.filter(v => v === "PASS").length;
          const fC = rowData.filter(v => v === "FAIL").length;

          if (fC > 0) w.classList.add("failRow");
          else if (p === 3) w.classList.add("passRow");

          const i = document.createElement("div");
          i.className = "gridRowInner";

          rowData.forEach(v => {
            const c = document.createElement("div");
            c.className = "cell";

            if (v === "PASS") c.classList.add("passText");
            else if (v === "FAIL") c.classList.add("failText");
            else c.classList.add("unText");

            c.textContent = v === "UN" ? "- - -" : v;
            i.appendChild(c);
          });

          w.appendChild(i);
          f2.appendChild(w);
        });
      }

      row.appendChild(f2);
    });

    g.appendChild(row);
  }

  full.appendChild(g);

  const backBtn2 = document.createElement("button");
  backBtn2.className = "darkButton";
  backBtn2.textContent = "Back to Summary";
  backBtn2.onclick = showSummary;

  full.appendChild(backBtn2);

  r.appendChild(full);

  // FORCE SUMMARY AS DEFAULT VIEW
  document.getElementById("summaryView").style.display = "block";
  document.getElementById("fullGridView").style.display = "none";

  document.getElementById("pdfBtn").style.display = "block";
  document.getElementById("sharePdfBtn").style.display = "block";
}

function showSummary() {
  document.getElementById("summaryView").style.display = "block";
  document.getElementById("fullGridView").style.display = "none";
}

function showFullGrid() {
  document.getElementById("summaryView").style.display = "none";
  document.getElementById("fullGridView").style.display = "block";
}

/* ---------------------------------------------------------
   INITIAL RENDER
--------------------------------------------------------- */

renderScreen();

/* ---------------------------------------------------------
   SAFARI‑SAFE PDF EXPORT
--------------------------------------------------------- */

async function downloadPDF() {
  const report = document.getElementById("report");
  const pdfBtn = document.getElementById("pdfBtn");
  const shareBtn = document.getElementById("sharePdfBtn");

  pdfBtn.style.display = "none";
  shareBtn.style.display = "none";

  document.getElementById("summaryView").style.display = "block";
  document.getElementById("fullGridView").style.display = "block";

  report.style.display = "block";
  void report.offsetHeight;
  await Promise.resolve();
  await new Promise(res => requestAnimationFrame(res));
  await new Promise(res => setTimeout(res, 120));

  const clone = report.cloneNode(true);
  clone.style.position = "absolute";
  clone.style.top = "-9999px";
  clone.style.left = "-9999px";
  document.body.appendChild(clone);

  const storeName = document.getElementById("store").value || "No_Store";
  const filename = `${storeName.replace(/[^a-zA-Z0-9]/g, "_")}_${new Date().toISOString().slice(0, 10)}_UHC_Report.pdf`;

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, backgroundColor: "#111", useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf()
    .set(opt)
    .from(clone)
    .toPdf()
    .get('pdf')
    .then(pdf => {
      const totalPages = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= totalPages; i++) {
        pdf.setPage(i);
        pdf.setFontSize(10);
        pdf.setTextColor(200, 200, 200);
        pdf.text(
          `Page ${i} of ${totalPages}`,
          pdf.internal.pageSize.getWidth() / 2,
          pdf.internal.pageSize.getHeight() - 10,
          { align: "center" }
        );
      }
    })
    .save()
    .then(() => {
      clone.remove();
      showSummary();
      pdfBtn.style.display = "block";
      shareBtn.style.display = "block";
    });
}

/* ---------------------------------------------------------
   SAFARI‑SAFE SHARE PDF
--------------------------------------------------------- */

async function sharePDF() {
  const report = document.getElementById("report");
  const pdfBtn = document.getElementById("pdfBtn");
  const shareBtn = document.getElementById("sharePdfBtn");

  pdfBtn.style.display = "none";
  shareBtn.style.display = "none";

  document.getElementById("summaryView").style.display = "block";
  document.getElementById("fullGridView").style.display = "block";

  report.style.display = "block";
  void report.offsetHeight;
  await Promise.resolve();
  await new Promise(res => requestAnimationFrame(res));
  await new Promise(res => setTimeout(res, 120));

  const clone = report.cloneNode(true);
  clone.style.position = "absolute";
  clone.style.top = "-9999px";
  clone.style.left = "-9999px";
  document.body.appendChild(clone);

  const storeName = document.getElementById("store").value || "No_Store";
  const filename = `${storeName.replace(/[^a-zA-Z0-9]/g, "_")}_${new Date().toISOString().slice(0, 10)}_UHC_Report.pdf`;

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, backgroundColor: "#111", useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  const pdfBlob = await html2pdf().set(opt).from(clone).output('blob');

  clone.remove();

  const file = new File([pdfBlob], filename, { type: "application/pdf" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({
      title: "UHC Button Test Report",
      text: "PDF Report",
      files: [file]
    });
  } else {
    alert("Sharing is not supported on this device or browser.");
  }

  showSummary();
  pdfBtn.style.display = "block";
  shareBtn.style.display = "block";
}

/* ---------------------------------------------------------
   QR GENERATION
--------------------------------------------------------- */

function generateQR(text) {
  const encoded = encodeURIComponent(text);
  return `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encoded}`;
}

/* ---------------------------------------------------------
   EDGE ON iOS DETECTION
--------------------------------------------------------- */

function isEdgeOniOS() {
  return /EdgiOS/i.test(navigator.userAgent);
}

window.addEventListener("DOMContentLoaded", () => {
  if (isEdgeOniOS()) {
    document.getElementById("pdfBtn").style.display = "none";
    document.getElementById("sharePdfBtn").style.display = "none";
  }

  document.getElementById("pdfBtn").onclick = downloadPDF;
  document.getElementById("sharePdfBtn").onclick = sharePDF;
});

</script>
