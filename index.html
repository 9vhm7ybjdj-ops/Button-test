<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Test Loader</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  #loaderScreen, #startScreen {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: absolute;
    top: 0; left: 0;
    transition: opacity 0.6s ease;
  }

  #loaderScreen {
    background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
  }

  .nameplate {
    width: 260px;
    height: 80px;
    background: linear-gradient(145deg, #d7d9dc, #a5a7aa);
    border-radius: 12px;
    box-shadow:
      0 0 0 2px #777,
      0 12px 20px rgba(0,0,0,0.6),
      inset 0 0 12px rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    font-weight: bold;
    color: #111;
    margin-bottom: 30px;
    text-shadow: 0 0 4px #fff;
  }

  .loadingBarOuter {
    width: 240px;
    height: 14px;
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
  }

  .loadingBarInner {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00ff00, #009900);
    box-shadow: 0 0 10px #00ff00;
    transition: width 1.5s ease;
  }

  /* START SCREEN */
  #startScreen {
    background: #111;
    opacity: 0;
    pointer-events: none;
  }

  #startScreen.active {
    opacity: 1;
    pointer-events: auto;
  }

  .startBox {
    width: 90%;
    max-width: 360px;
    background: #222;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(0,255,0,0.4);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  label {
    font-size: 14px;
    margin-bottom: 4px;
    opacity: 0.9;
  }

  select, button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #333;
    color: #fff;
    font-size: 16px;
  }

  button {
    background: #111;
    border: 2px solid #00ff00;
    color: #7CFC00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loaderScreen">
  <div class="nameplate">UHC TEST v1.0</div>

  <div class="loadingBarOuter">
    <div class="loadingBarInner" id="loadingBar"></div>
  </div>
</div>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="startBox">

    <label for="storeSelect">Store</label>
    <select id="storeSelect">
      <option value="">Select Store…</option>
      <option value="Kuluin — 0818">Kuluin — 0818</option>
      <option value="Nambour — 0892">Nambour — 0892</option>
      <option value="Maroochydore — 0981">Maroochydore — 0981</option>
      <option value="Sippy Downs — 1614">Sippy Downs — 1614</option>
    </select>

    <button id="startBtn">Start Test</button>
  </div>
</div>

<script>
  const loader = document.getElementById("loaderScreen");
  const startScreen = document.getElementById("startScreen");
  const loadingBar = document.getElementById("loadingBar");

  // Animate loading bar
  setTimeout(() => {
    loadingBar.style.width = "100%";
  }, 100);

  // Fade out loader → show start screen
  setTimeout(() => {
    loader.style.opacity = 0;
    setTimeout(() => {
      loader.style.display = "none";
      startScreen.classList.add("active");
    }, 600);
  }, 1600);

  // Start button
  document.getElementById("startBtn").onclick = () => {
    const store = document.getElementById("storeSelect").value;

    if (!store) {
      alert("Please select a store");
      return;
    }

    // Split into name + number
    const [storeName, storeNumber] = store.split(" — ");

    window.location.href =
      `app.html?store=${encodeURIComponent(storeName)}&num=${storeNumber}`;
  };
</script>

</body>
</html>
