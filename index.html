<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Test Loader</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* LOADING SCREEN */
  #loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #444 0%, #111 100%);
    transition: opacity 1s ease;
  }

  .logo {
    width: 260px;
    max-width: 80vw;
    padding: 24px 10px 18px;
    border-radius: 12px;
    background: linear-gradient(145deg, #d7d9dc, #a5a7aa);
    box-shadow: 0 0 0 2px #777, 0 12px 20px rgba(0,0,0,0.6);
    position: relative;
    text-align: center;
    box-sizing: border-box;
  }

  .logo::before,
  .logo::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #666;
    background: radial-gradient(circle at 30% 30%, #f5f5f5, #999);
    box-shadow: 0 0 4px rgba(0,0,0,0.6);
    top: 8px;
  }
  .logo::before { left: 10px; }
  .logo::after  { right: 10px; }

  .logo-title {
    font-size: 24px;
    font-weight: bold;
    color: #222;
    letter-spacing: 2px;
    text-shadow: 0 0 4px rgba(255,255,255,0.8);
  }

  .logo-sub {
    margin-top: 6px;
    font-size: 14px;
    color: #444;
  }

  .logo-version {
    margin-top: 10px;
    font-size: 13px;
    color: #ffeb3b;
  }

  .bar {
    width: 220px;
    max-width: 70vw;
    height: 8px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 20px;
  }

  .bar-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00ffcc, #00aaff);
    border-radius: 4px;
    transition: width 1.5s ease;
  }

  /* STORE SELECT SCREEN */
  #app {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .header {
    font-size: 22px;
    font-weight: bold;
  }

  .sub {
    opacity: 0.8;
    margin-bottom: 10px;
  }

  select {
    width: 100%;
    max-width: 320px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #555;
    background: #222;
    color: #fff;
    font-size: 16px;
  }

  button {
    padding: 12px 20px;
    background: #2b6cb0;
    border: 1px solid #777;
    border-radius: 6px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.98);
  }
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="logo">
    <div class="logo-title">UHC TEST</div>
    <div class="logo-sub">Stainless Panel</div>
    <div class="logo-version">v1.0</div>
  </div>
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
</div>

<!-- STORE SELECT -->
<div id="app">
  <div class="header">UHC Test</div>
  <div class="sub">Select store to begin</div>

  <select id="storeSelect">
    <option value="">Select Store</option>
    <option value="Kuluin|0818">Kuluin – 0818</option>
    <option value="Nambour|0892">Nambour – 0892</option>
    <option value="Maroochydore|0981">Maroochydore – 0981</option>
    <option value="Sippy Downs|1614">Sippy Downs – 1614</option>
  </select>

  <button id="startBtn">Start</button>
</div>

<script>
  const loader = document.getElementById('loader');
  const barFill = document.getElementById('barFill');
  const app = document.getElementById('app');

  // Animate loading bar
  setTimeout(() => {
    barFill.style.width = '100%';
  }, 300);

  // Fade out loader and show app
  setTimeout(() => {
    loader.style.opacity = '0';
    setTimeout(() => {
      loader.style.display = 'none';
      app.style.display = 'flex';
    }, 1000);
  }, 1800);

  // Redirect to app.html
  document.getElementById('startBtn').onclick = () => {
    const val = document.getElementById('storeSelect').value;
    if (!val) return;
    const [store, num] = val.split('|');
    window.location.href = `app.html?store=${encodeURIComponent(store)}&num=${encodeURIComponent(num)}`;
  };
</script>

</body>
</html>
