<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHC Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

    <!-- V1.0 LOADING SCREEN -->
    <div id="loadingScreen">
        <div id="loadingBar"></div>
    </div>

    <!-- MAIN APP SCREENS -->
    <div id="storeScreen" class="screen">
        <h1>UHC Button Test</h1>

        <label>Store Name</label>
        <input id="storeName" type="text">

        <label>Store Number</label>
        <input id="storeNumber" type="text">

        <button id="startTest">Start Test</button>
    </div>

    <div id="testScreen" class="screen" style="display:none;">
        <h2 id="unitTitle"></h2>
        <h3 id="faceTitle"></h3>

        <div id="uhcFace" class="steel-face">
            <div class="circle" id="c1"></div>
            <div class="circle" id="c2"></div>
            <div class="circle" id="c3"></div>
            <div class="circle" id="c4"></div>
            <div class="circle" id="c5"></div>
            <div class="circle" id="c6"></div>
            <div class="circle" id="c7"></div>
            <div class="circle" id="c8"></div>
            <div class="circle" id="c9"></div>
        </div>

        <div id="testButtons">
            <button id="failBtn" class="fail">FAIL</button>
            <button id="passBtn" class="pass">PASS</button>
            <button id="skipBtn" class="skip">SKIP UNIT</button>
        </div>
    </div>

    <div id="reportScreen" class="screen" style="display:none;">
        <h2>Test Report</h2>
        <div id="reportContent"></div>

        <button id="backToTest">Back</button>
        <button id="newTest">New Test</button>
        <button id="downloadPDF">Generate Image</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
