<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulated Haptics Test</title>

<style>
  body {
    background: #000;
    color: #7CFC00;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    height: 100vh;
    text-align: center;
  }

  .btn {
    width: 180px;
    padding: 12px;
    margin: 10px;
    font-size: 16px;
    border-radius: 8px;

    background: #111;
    color: #7CFC00;

    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;

    cursor: pointer;

    transition: transform 0.05s ease, box-shadow 0.05s ease;
  }

  .btn:active {
    transform: scale(0.94);
    box-shadow: 0 0 4px #00ff00;
  }

  /* Flash effect */
  .flash {
    animation: flashAnim 120ms ease-out;
  }

  @keyframes flashAnim {
    0% { background-color: #333; }
    50% { background-color: #7CFC00; }
    100% { background-color: #111; }
  }
</style>
</head>

<body>

<h2>Simulated Haptics Test</h2>

<button class="btn" onclick="lightClick(this)">Light Click</button>
<button class="btn" onclick="mediumClick(this)">Medium Click</button>
<button class="btn" onclick="heavyClick(this)">Heavy Click</button>
<button class="btn" onclick="comboClick(this)">Tick + Thump Combo</button>

<script>
/* -----------------------------
   Sound Generators
--------------------------------*/
function playTick() {
  const a = new AudioContext();
  const o = a.createOscillator();
  const g = a.createGain();

  o.type = "triangle";
  o.frequency.value = 3000;

  g.gain.setValueAtTime(0.1, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.03);

  o.connect(g).connect(a.destination);
  o.start();
  o.stop(a.currentTime + 0.03);
}

function playThump() {
  const a = new AudioContext();
  const o = a.createOscillator();
  const g = a.createGain();

  o.type = "sine";
  o.frequency.setValueAtTime(120, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, a.currentTime + 0.12);

  g.gain.setValueAtTime(0.3, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.12);

  o.connect(g).connect(a.destination);
  o.start();
  o.stop(a.currentTime + 0.12);
}

/* -----------------------------
   Visual Micro‑Feedback
--------------------------------*/
function flash(btn) {
  btn.classList.add("flash");
  setTimeout(() => btn.classList.remove("flash"), 120);
}

/* -----------------------------
   Simulated Haptic Patterns
--------------------------------*/
function lightClick(btn) {
  playTick();
  flash(btn);
}

function mediumClick(btn) {
  playTick();
  setTimeout(playThump, 40);
  flash(btn);
}

function heavyClick(btn) {
  playThump();
  flash(btn);
}

function comboClick(btn) {
  playTick();
  setTimeout(playThump, 50);
  flash(btn);
}
</script>

</body>
</html>
