<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Test App</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;

    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 20px 10px 40px;
  }

  #app {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel {
    background: rgba(0,0,0,0.75);
    border-radius: 12px;
    border: 1px solid #555;
    padding: 16px;
  }

  .title {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 12px;
  }

  .button {
    background: rgba(0,0,0,0.7);
    border: 1px solid #44ff44;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
    cursor: pointer;
    text-shadow: 0 0 6px #00ff00;
    margin-top: 10px;
  }

  .button:hover {
    background: rgba(0,0,0,0.9);
  }
</style>
</head>

<body>
<div id="app">

  <div class="panel">
    <div class="title">UHC Testing</div>

    <!-- Your existing UI elements go here -->
    <!-- Unit selection, face selection, LED grid, PASS/FAIL buttons, etc. -->

    <!-- FINISH BUTTON (already existed, now wired) -->
    <div id="finishBtn" class="button">Finish</div>
  </div>

</div>
<script>
  /*
    Your existing variables and logic remain unchanged.
    Example structure (yours may differ slightly):
  */

  let units = [
    {
      unit: 1,
      touchscreen: false,
      front: [ ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"] ],
      back:  [ ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"] ]
    },
    {
      unit: 2,
      touchscreen: true,
      front: [ ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"] ],
      back:  [ ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"] ]
    },
    {
      unit: 3,
      touchscreen: false,
      front: [ ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"] ],
      back:  [ ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"], ["UN","UN","UN"] ]
    }
  ];

  // Your existing testing logic stays exactly as-is.
  // (LED updates, PASS/FAIL buttons, navigation, etc.)

  // ----------------------------------------------------
  // FINISH BUTTON → SAVE DATA → REDIRECT TO SELECT SCREEN
  // ----------------------------------------------------
  document.getElementById("finishBtn").addEventListener("click", finishReport);

  function finishReport() {

    // Save full UHC data for detailed_report.html
    sessionStorage.setItem("uhcFullData", JSON.stringify(units));

    // Save summary data for report.html (your existing summary report)
    sessionStorage.setItem("uhcSummary", JSON.stringify(units));

    // Save store info (your app already sets these earlier)
    sessionStorage.setItem("storeName", storeName);
    sessionStorage.setItem("storeNumber", storeNumber);

    // Save timestamp for both reports
    sessionStorage.setItem("dateString", new Date().toLocaleString());

    // Redirect to the new selection screen
    window.location.href = "report_select.html";
  }
</script>

</body>
</html>
