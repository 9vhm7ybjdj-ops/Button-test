<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Multi-Unit Test</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  #app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .screen {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .screen.active {
    display: flex;
  }

  .header-row {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    text-align: center;
  }

  .store-header {
    font-size: 16px;
    font-weight: bold;
  }

  .unit-header {
    font-size: 14px;
    opacity: 0.85;
  }

  .uhc-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .uhc-panel {
    width: 340px;
    padding: 18px;
    border-radius: 12px;
    background: linear-gradient(145deg, #d7d9dc, #a5a7aa);
    box-shadow:
      0 0 0 2px #777,
      0 12px 20px rgba(0,0,0,0.6);
    position: relative;
    box-sizing: border-box;
  }

  .uhc-panel::before,
  .uhc-panel::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #666;
    background: radial-gradient(circle at 30% 30%, #f5f5f5, #999);
    box-shadow: 0 0 4px rgba(0,0,0,0.6);
  }
  .uhc-panel::before { top: 8px; left: 10px; }
  .uhc-panel::after  { top: 8px; right: 10px; }

  .uhc-top-bar {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    margin-bottom: 16px;
  }

  .uhc-top-bar-empty {
    height: 40px;
    margin-bottom: 16px;
  }

  .uhc-slots {
    display: flex;
    gap: 6px;
  }

  .uhc-slot {
    width: 36px;
    height: 18px;
    background: #111;
    border-radius: 3px;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
  }

  .uhc-top-indicators {
    display: flex;
    gap: 5px;
    margin-left: 6px;
  }

  .uhc-top-led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1a3f1a;
    box-shadow: 0 0 4px #0a0;
  }

  .uhc-top-spacer {
    flex: 1;
  }

  .uhc-keypad {
    display: grid;
    grid-template-columns: repeat(3, 20px);
    grid-auto-rows: 20px;
    gap: 4px;
    margin-right: 10px;
  }

  .uhc-key {
    background: #dcdfe2;
    border-radius: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.6);
    font-size: 11px;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .uhc-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .uhc-row {
    width: 100%;
    background: #222;
    border-radius: 6px;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
    transition: box-shadow 0.2s ease;
    box-sizing: border-box;
  }

  .uhc-row.passRow {
    box-shadow: 0 0 14px #00ff00, inset 0 0 6px rgba(0,0,0,0.8);
  }

  .uhc-row.failRow {
    box-shadow: 0 0 14px #ff0000, inset 0 0 6px rgba(0,0,0,0.8);
  }

  .uhc-row-inner {
    display: flex;
    justify-content: center;
    padding: 10px 0;
  }

  .uhc-led-block {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 0 auto;
  }

  .uhc-led {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid #333;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
    cursor: pointer;
  }

  .uhc-led.pass {
    background: radial-gradient(circle at 30% 30%, #9eff9e, #00a000);
    box-shadow: 0 0 8px #00ff00;
    border-color: #0f0;
  }

  .uhc-led.fail {
    background: radial-gradient(circle at 30% 30%, #ffb0b0, #c00000);
    box-shadow: 0 0 8px #ff0000;
    border-color: #f00;
  }

  .uhc-led.un {
    background: radial-gradient(circle at 30% 30%, #ffffff, #c0c0c0);
    box-shadow: 0 0 6px #ffffaa;
    border-color: #ffeb3b;
  }

  .uhc-label {
    font-size: 14px;
    min-width: 36px;
    text-align: left;
  }

  .touchscreen-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 16px;
  }

  .touchscreen-label input {
    transform: scale(1.4);
  }

  .touchscreen-spacer {
    height: 32px;
    margin-top: 10px;
    visibility: hidden;
  }

  .nav-row {
    margin-top: 10px;
    display: flex;
    justify-content: flex-end;
    width: 100%;
  }

  .nav-row button {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #777;
    background: #333;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }

  .nav-row button:active {
    transform: scale(0.98);
  }

  .report-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }

  .report-item {
    padding: 8px 10px;
    border-radius: 6px;
    background: #1b1b1b;
    border: 1px solid #444;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
  }

  .report-label {
    opacity: 0.85;
  }

  .status-fail {
    color: #ff5555;
  }

  .status-pass {
    color: #7CFC00;
  }

  .status-skip {
    color: #ffeb3b;
  }
</style>
</head>

<body>
<div id="app">

  <div id="testScreen" class="screen active">
    <div class="header-row">
      <div class="store-header" id="storeHeader"></div>
      <div class="unit-header" id="unitHeader"></div>
    </div>

    <div class="uhc-wrapper" id="frontWrapper">
      <div class="uhc-panel" id="frontPanel">
        <div class="uhc-top-bar">
          <div class="uhc-slots">
            <div class="uhc-slot"></div>
            <div class="uhc-slot"></div>
          </div>

          <div class="uhc-top-indicators">
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
          </div>

          <div class="uhc-top-spacer"></div>

          <div class="uhc-keypad">
            <div class="uhc-key">1</div>
            <div class="uhc-key">2</div>
            <div class="uhc-key">3</div>
            <div class="uhc-key">4</div>
            <div class="uhc-key">5</div>
            <div class="uhc-key">6</div>
            <div class="uhc-key">7</div>
            <div class="uhc-key">8</div>
            <div class="uhc-key">9</div>
          </div>
        </div>

        <div class="uhc-rows" id="frontRows"></div>
      </div>

      <label class="touchscreen-label" id="touchscreenRow">
        <input type="checkbox" id="touchscreenToggle">
        Touchscreen
      </label>
    </div>

    <div class="uhc-wrapper" id="backWrapper">
      <div class="uhc-panel" id="backPanel">
        <div class="uhc-top-bar-empty"></div>
        <div class="uhc-rows" id="backRows"></div>
      </div>

      <div class="touchscreen-spacer"></div>
    </div>

    <div class="nav-row">
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <div id="reportScreen" class="screen">
    <div class="header-row">
      <div class="store-header" id="reportStoreHeader"></div>
      <div class="unit-header">Summary</div>
    </div>

    <div class="report-list" id="reportList"></div>
  </div>

</div>

<script>
  const TOTAL_UNITS = 3;

  const testScreen    = document.getElementById('testScreen');
  const reportScreen  = document.getElementById('reportScreen');

  const storeHeader = document.getElementById('storeHeader');
  const unitHeader  = document.getElementById('unitHeader');

  const frontWrapper      = document.getElementById('frontWrapper');
  const backWrapper       = document.getElementById('backWrapper');
  const frontRows         = document.getElementById('frontRows');
  const backRows          = document.getElementById('backRows');
  const touchscreenRow    = document.getElementById('touchscreenRow');
  const touchscreenToggle = document.getElementById('touchscreenToggle');
  const nextBtn           = document.getElementById('nextBtn');

  const reportStoreHeader = document.getElementById('reportStoreHeader');
  const reportList        = document.getElementById('reportList');

  let storeName = '';
  let storeNumber = '';

  const units = [];

  const steps = [];
  for (let u = 1; u <= TOTAL_UNITS; u++) steps.push({ unit: u, face: 'front' });
  for (let u = 1; u <= TOTAL_UNITS; u++) steps.push({ unit: u, face: 'back' });

  let currentStepIndex = 0;

  function initUnits() {
    for (let i = 0; i < TOTAL_UNITS; i++) {
      units.push({
        front: Array.from({ length: 6 }, () =>
          Array.from({ length: 3 }, () => 'UN')
        ),
        back: Array.from({ length: 6 }, () =>
          Array.from({ length: 3 }, () => 'UN')
        ),
        touchscreen: false
      });
    }
  }

  function createEl(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function renderPanel(container, data, unitIndex, face) {
    container.innerHTML = '';

    data.forEach((row, rIndex) => {
      const rowEl = createEl('div', 'uhc-row');
      const inner = createEl('div', 'uhc-row-inner');
      const block = createEl('div', 'uhc-led-block');

      if (row.some(v => v === 'FAIL')) rowEl.classList.add('failRow');
      else if (row.every(v => v === 'PASS')) rowEl.classList.add('passRow');

      row.forEach((state, cIndex) => {
        const led = createEl('div', 'uhc-led');
        if (state === 'PASS') led.classList.add('pass');
        else if (state === 'FAIL') led.classList.add('fail');
        else led.classList.add('un');

        led.onclick = () => {
          const current = units[unitIndex][face][rIndex][cIndex];
          const next =
            current === 'UN'   ? 'PASS' :
            current === 'PASS' ? 'FAIL' :
            'UN';
          units[unitIndex][face][rIndex][cIndex] = next;
          renderCurrentFace();
          checkAutoProgress();
        };

        const labelText =
          state === 'PASS' ? 'PASS' :
          state === 'FAIL' ? 'FAIL' :
          '- - -';

        const label = createEl('div', 'uhc-label', labelText);

        block.appendChild(led);
        block.appendChild(label);
      });

      inner.appendChild(block);
      rowEl.appendChild(inner);
      container.appendChild(rowEl);
    });
  }
  function isFaceComplete(unitIndex, face) {
    if (units[unitIndex].touchscreen) return true;
    const grid = units[unitIndex][face];
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < grid[r].length; c++) {
        if (grid[r][c] === 'UN') return false;
      }
    }
    return true;
  }

  function checkAutoProgress() {
    const step = steps[currentStepIndex];
    const unitIndex = step.unit - 1;
    const face = step.face;

    if (units[unitIndex].touchscreen || isFaceComplete(unitIndex, face)) {
      advanceStep();
    }
  }

  function advanceStep() {
    currentStepIndex++;
    if (currentStepIndex >= steps.length) {
      showReport();
    } else {
      loadStep();
    }
  }

  function renderCurrentFace() {
    const step = steps[currentStepIndex];
    const unitIndex = step.unit - 1;
    const face = step.face;

    unitHeader.textContent =
      `Unit ${step.unit} of ${TOTAL_UNITS} — ${face === 'front' ? 'Front' : 'Back'}`;

    if (face === 'front') {
      frontWrapper.style.display = 'flex';
      backWrapper.style.display  = 'none';
      touchscreenRow.style.display = 'flex';
      touchscreenToggle.checked = units[unitIndex].touchscreen;
      renderPanel(frontRows, units[unitIndex].front, unitIndex, 'front');
    } else {
      if (units[unitIndex].touchscreen) {
        advanceStep();
        return;
      }
      frontWrapper.style.display = 'none';
      backWrapper.style.display  = 'flex';
      touchscreenRow.style.display = 'none';
      renderPanel(backRows, units[unitIndex].back, unitIndex, 'back');
    }
  }

  function loadStep() {
    renderCurrentFace();
  }

  function showReport() {
    testScreen.classList.remove('active');
    reportScreen.classList.add('active');

    reportStoreHeader.textContent = `${storeName} — ${storeNumber}`;
    reportList.innerHTML = '';

    for (let u = 0; u < TOTAL_UNITS; u++) {
      ['front', 'back'].forEach(face => {
        const item = createEl('div', 'report-item');
        const label = createEl('div', 'report-label',
          `Unit ${u + 1} — ${face === 'front' ? 'Front' : 'Back'}`);

        let statusText = '';
        let statusClass = '';

        if (units[u].touchscreen) {
          statusText = 'Skipped (Touchscreen)';
          statusClass = 'status-skip';
        } else {
          const grid = units[u][face];
          let failedRows = 0;

          for (let r = 0; r < grid.length; r++) {
            if (grid[r].some(v => v === 'FAIL')) {
              failedRows++;
            }
          }

          if (failedRows > 0) {
            statusText = `${failedRows} failed rows`;
            statusClass = 'status-fail';
          } else {
            statusText = `0 failed rows`;
            statusClass = 'status-pass';
          }
        }

        const status = createEl('div', statusClass, statusText);
        item.appendChild(label);
        item.appendChild(status);
        reportList.appendChild(item);
      });
    }
  }

  // Touchscreen skip handler
  touchscreenToggle.onchange = () => {
    const step = steps[currentStepIndex];
    const unitIndex = step.unit - 1;

    if (step.face !== 'front') return;

    if (touchscreenToggle.checked) {
      units[unitIndex].touchscreen = true;
      advanceStep();
    } else {
      units[unitIndex].touchscreen = false;
    }
  };

  // Manual Next button
  nextBtn.onclick = () => {
    advanceStep();
  };

  // Parse URL parameters
  function getParams() {
    const params = new URLSearchParams(window.location.search);
    storeName = params.get('store') || 'Store';
    storeNumber = params.get('num') || '0000';
  }

  // Init
  getParams();
  storeHeader.textContent = `${storeName} — ${storeNumber}`;
  initUnits();
  loadStep();
</script>

</body>
</html>
