<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>UHC Test</title>

<link rel="manifest" href="manifest.json">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100%;
    overflow: hidden;
  }

  #app {
    width: 100%;
    height: 100%;
    padding: 20px;
    box-sizing: border-box;
  }

  .unitBlock {
    background: #000;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid #333;
    margin-bottom: 20px;
  }

  .unitTitle {
    font-size: 20px;
    margin-bottom: 10px;
    text-align: center;
  }

  .gridRow {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .cellBtn {
    width: 70px;
    height: 40px;
    border-radius: 6px;
    border: 2px solid #00ff00;
    background: #111;
    color: #7CFC00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 10px #00ff00;
    font-size: 16px;
    cursor: pointer;
  }

  .cellBtn.fail {
    border-color: #ff0000;
    color: #ff9999;
    text-shadow: 0 0 6px #ff0000;
    box-shadow: 0 0 10px #ff0000;
  }

  .touchToggle {
    margin-top: 10px;
    text-align: center;
  }

  .finishBtn {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    border-radius: 10px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 14px #00ff00;
    font-size: 20px;
    cursor: pointer;
  }
</style>
</head>

<body>
<div id="app">

  <h1 style="text-align:center;">UHC Test</h1>

  <div id="unitsContainer"></div>

  <button id="finishBtn" class="finishBtn">Finish Test</button>

</div>

<script>
  const storeName = sessionStorage.getItem("storeName") || "";
  const storeNumber = sessionStorage.getItem("storeNumber") || "";

  // 3 UHC units
  const units = [
    { front: [["PASS","PASS","PASS"],["PASS","PASS","PASS"],["PASS","PASS","PASS"]],
      back:  [["PASS","PASS","PASS"],["PASS","PASS","PASS"],["PASS","PASS","PASS"]],
      touchscreen: false },

    { front: [["PASS","PASS","PASS"],["PASS","PASS","PASS"],["PASS","PASS","PASS"]],
      back:  [["PASS","PASS","PASS"],["PASS","PASS","PASS"],["PASS","PASS","PASS"]],
      touchscreen: false },

    { front: [["PASS","PASS","PASS"],["PASS","PASS","PASS"],["PASS","PASS","PASS"]],
      back:  [["PASS","PASS","PASS"],["PASS","PASS","PASS"],["PASS","PASS","PASS"]],
      touchscreen: false }
  ];

  const container = document.getElementById("unitsContainer");

  function renderUnits() {
    container.innerHTML = "";

    units.forEach((unit, index) => {
      const block = document.createElement("div");
      block.className = "unitBlock";

      block.innerHTML = `<div class="unitTitle">Unit ${index + 1}</div>`;

      ["front", "back"].forEach(face => {
        const title = document.createElement("div");
        title.style.textAlign = "center";
        title.style.margin = "10px 0 6px";
        title.textContent = face.toUpperCase();
        block.appendChild(title);

        unit[face].forEach((row, rIndex) => {
          const rowDiv = document.createElement("div");
          rowDiv.className = "gridRow";

          row.forEach((state, cIndex) => {
            const btn = document.createElement("button");
            btn.className = "cellBtn";
            btn.textContent = state;

            if (state === "FAIL") btn.classList.add("fail");

            btn.onclick = () => {
              const current = units[index][face][rIndex][cIndex];
              const next = current === "PASS" ? "FAIL" : "PASS";
              units[index][face][rIndex][cIndex] = next;
              renderUnits();
            };

            rowDiv.appendChild(btn);
          });

          block.appendChild(rowDiv);
        });
      });

      const toggle = document.createElement("div");
      toggle.className = "touchToggle";
      toggle.innerHTML = `
        <label>
          <input type="checkbox" ${unit.touchscreen ? "checked" : ""}>
          Touchscreen Enabled (Skip Testing)
        </label>
      `;

      toggle.querySelector("input").onchange = e => {
        units[index].touchscreen = e.target.checked;
      };

      block.appendChild(toggle);
      container.appendChild(block);
    });
  }

  renderUnits();
  // ⭐ FINISH BUTTON — builds correct summary + saves everything
  finishBtn.onclick = () => {

    const summary = [];

    units.forEach((unit, index) => {

      // FRONT SUMMARY
      if (unit.touchscreen) {
        summary.push({
          unit: index + 1,
          face: "front",
          status: "Skipped (Touchscreen)"
        });
      } else {
        const failedFront = unit.front.filter(
          row => row.includes("FAIL")
        ).length;

        summary.push({
          unit: index + 1,
          face: "front",
          status: `${failedFront} failed rows`
        });
      }

      // BACK SUMMARY
      if (unit.touchscreen) {
        summary.push({
          unit: index + 1,
          face: "back",
          status: "Skipped (Touchscreen)"
        });
      } else {
        const failedBack = unit.back.filter(
          row => row.includes("FAIL")
        ).length;

        summary.push({
          unit: index + 1,
          face: "back",
          status: `${failedBack} failed rows`
        });
      }
    });

    // ⭐ Save everything
    sessionStorage.setItem("uhcFullData", JSON.stringify(units));
    sessionStorage.setItem("uhcSummary", JSON.stringify(summary));
    sessionStorage.setItem("storeName", storeName);
    sessionStorage.setItem("storeNumber", storeNumber);
    sessionStorage.setItem("dateString", new Date().toLocaleString());

    // Go to summary report
    window.location.href = "report.html";
  };
</script>

</body>
</html>
