<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Multi-Unit Test</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    background-image:
      linear-gradient(rgba(0,255,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  #app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .screen {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .screen.active {
    display: flex;
  }

  .header-row {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    text-align: center;
  }

  .store-header {
    font-size: 16px;
    font-weight: bold;
  }

  .uhc-name-header {
    font-size: 15px;
    font-weight: 600;
    opacity: 0.9;
    text-align: center;
    margin-top: -2px;
  }

  .unit-header {
    font-size: 14px;
    opacity: 0.85;
  }

  .uhc-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .uhc-panel {
    width: 340px;
    padding: 18px;
    border-radius: 12px;
    background: linear-gradient(145deg, #d7d9dc, #a5a7aa);
    box-shadow:
      0 0 0 2px #777,
      0 12px 20px rgba(0,0,0,0.6);
    position: relative;
    box-sizing: border-box;
  }

  .uhc-panel::before,
  .uhc-panel::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #666;
    background: radial-gradient(circle at 30% 30%, #f5f5f5, #999);
    box-shadow: 0 0 4px rgba(0,0,0,0.6);
  }
  .uhc-panel::before { top: 8px; left: 10px; }
  .uhc-panel::after  { top: 8px; right: 10px; }

  .uhc-top-bar {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    height: 40px;
    margin-bottom: 16px;
  }

  .back-top-bar {
    height: 40px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
  }

  .invisible { visibility: hidden; }

  .back-bottom-spacer { height: 32px; }

  .uhc-slots { display: flex; gap: 6px; }

  .uhc-slot {
    width: 36px;
    height: 18px;
    background: #111;
    border-radius: 3px;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
  }

  .uhc-top-indicators {
    display: flex;
    gap: 5px;
    margin-left: 6px;
  }

  .uhc-top-led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1a3f1a;
    box-shadow: 0 0 4px #0a0;
  }

  .uhc-top-spacer { flex: 1; }

  .uhc-keypad {
    display: grid;
    grid-template-columns: repeat(3, 20px);
    grid-auto-rows: 20px;
    gap: 4px;
    margin-right: 10px;
  }

  .uhc-key {
    background: #dcdfe2;
    border-radius: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.6);
    font-size: 11px;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .uhc-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .uhc-row {
    width: 100%;
    background: #222;
    border-radius: 6px;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
    transition: box-shadow 0.2s ease;
    box-sizing: border-box;
  }

  .uhc-row.passRow {
    box-shadow: 0 0 14px #00ff00, inset 0 0 6px rgba(0,0,0,0.8);
  }

  .uhc-row.failRow {
    box-shadow: 0 0 14px #ff0000, inset 0 0 6px rgba(0,0,0,0.8);
  }

  .uhc-row-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    gap: 10px;
  }

  .uhc-led {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid #333;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
    cursor: pointer;
  }

  .uhc-led.pass {
    background: radial-gradient(circle at 30% 30%, #9eff9e, #00a000);
    box-shadow: 0 0 8px #00ff00;
    border-color: #0f0;
  }

  .uhc-led.fail {
    background: radial-gradient(circle at 30% 30%, #ffb0b0, #c00000);
    box-shadow: 0 0 8px #ff0000;
    border-color: #f00;
  }

  .uhc-led.un {
    background: radial-gradient(circle at 30% 30%, #ffffff, #c0c0c0);
    box-shadow: inset 0 0 6px #000;
    border-color: #555;
  }

  .uhc-label {
    width: 40px;
    font-size: 14px;
    text-align: left;
  }

  .uhc-row-btn {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    background: #dcdfe2;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
  }

  .uhc-row-btn:active {
    box-shadow: inset 0 0 6px rgba(0,0,0,0.9);
  }

  .uhc-row-btn svg {
    width: 12px;
    height: 12px;
    fill: #111;
  }

  .touchscreen-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 16px;
  }

  .touchscreen-label input { transform: scale(1.4); }

  .touchscreen-spacer {
    height: 32px;
    margin-top: 10px;
    display: none;
  }

  .nav-row {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    gap: 50px;
    width: 100%;
  }

  .nav-row button,
  #finishBtn {
    padding: 10px 20px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 14px #00ff00;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .nav-row button:active,
  #finishBtn:active {
    transform: scale(0.97);
  }

  #finishBtn {
    display: none;
    text-align: center;
  }
</style>
</head>

<body>
<div id="app">
  <div id="testScreen" class="screen active">
    <div class="header-row">
      <div class="store-header" id="storeHeader"></div>
      <div class="uhc-name-header" id="uhcNameHeader"></div>
      <div class="unit-header" id="unitHeader"></div>
    </div>

    <!-- FRONT PANEL -->
    <div class="uhc-wrapper" id="frontWrapper">
      <div class="uhc-panel" id="frontPanel">

        <div class="uhc-top-bar">
          <div class="uhc-slots">
            <div class="uhc-slot"></div>
            <div class="uhc-slot"></div>
          </div>

          <div class="uhc-top-indicators">
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
          </div>

          <div class="uhc-top-spacer"></div>

          <div class="uhc-keypad">
            <div class="uhc-key">1</div>
            <div class="uhc-key">2</div>
            <div class="uhc-key">3</div>
            <div class="uhc-key">4</div>
            <div class="uhc-key">5</div>
            <div class="uhc-key">6</div>
            <div class="uhc-key">7</div>
            <div class="uhc-key">8</div>
            <div class="uhc-key">9</div>
          </div>
        </div>

        <div class="uhc-rows" id="frontRows"></div>
      </div>

      <label class="touchscreen-label" id="touchscreenRow">
        <input type="checkbox" id="touchscreenToggle">
        Touchscreen
      </label>

      <div class="touchscreen-spacer" id="backSpacer"></div>
    </div>

    <!-- BACK PANEL -->
    <div class="uhc-wrapper" id="backWrapper">
      <div class="uhc-panel" id="backPanel">

        <div class="uhc-top-bar back-top-bar">
          <div class="uhc-slots invisible">
            <div class="uhc-slot"></div>
            <div class="uhc-slot"></div>
          </div>

          <div class="uhc-top-indicators invisible">
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
            <div class="uhc-top-led"></div>
          </div>

          <div class="uhc-top-spacer"></div>

          <div class="uhc-keypad invisible">
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
            <div class="uhc-key"></div>
          </div>
        </div>

        <div class="uhc-rows" id="backRows"></div>

      </div>

      <div class="back-bottom-spacer"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-row">
      <button id="backBtn">Back</button>
      <button id="nextBtn">Next</button>
      <button id="finishBtn">Finish</button>
    </div>

  </div>
</div>

<script>
  const TOTAL_UNITS = 3;

  const testScreen = document.getElementById('testScreen');
  const storeHeader = document.getElementById('storeHeader');
  const uhcNameHeader = document.getElementById('uhcNameHeader');
  const unitHeader = document.getElementById('unitHeader');

  const frontWrapper = document.getElementById('frontWrapper');
  const backWrapper = document.getElementById('backWrapper');
  const frontRows = document.getElementById('frontRows');
  const backRows = document.getElementById('backRows');
  const touchscreenRow = document.getElementById('touchscreenRow');
  const touchscreenToggle = document.getElementById('touchscreenToggle');
  const backSpacer = document.getElementById('backSpacer');

  const nextBtn = document.getElementById('nextBtn');
  const backBtn = document.getElementById('backBtn');
  const finishBtn = document.getElementById('finishBtn');

  let storeName = '';
  let storeNumber = '';

  const units = [];

  /* CORRECT ORDER: ALL FRONTS → THEN ALL BACKS */
  const steps = [];
  for (let u = 1; u <= TOTAL_UNITS; u++) steps.push({ unit: u, face: 'front' });
  for (let u = 1; u <= TOTAL_UNITS; u++) steps.push({ unit: u, face: 'back' });

  let currentStepIndex = 0;

  function playComboSound() {
    const a = new AudioContext();
    const o1 = a.createOscillator();
    const g1 = a.createGain();
    o1.type = 'triangle';
    o1.frequency.value = 3200;
    g1.gain.setValueAtTime(0.08, a.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.03);
    o1.connect(g1); g1.connect(a.destination);
    o1.start(); o1.stop(a.currentTime + 0.03);

    const o2 = a.createOscillator();
    const g2 = a.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(120, a.currentTime);
    o2.frequency.exponentialRampToValueAtTime(60, a.currentTime + 0.12);
    g2.gain.setValueAtTime(0.25, a.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.12);
    o2.connect(g2); g2.connect(a.destination);
    o2.start(); o2.stop(a.currentTime + 0.12);
  }

  function initUnits() {
    for (let i = 0; i < TOTAL_UNITS; i++) {
      units.push({
        front: Array.from({ length: 6 }, () =>
          Array.from({ length: 3 }, () => 'UN')
        ),
        back: Array.from({ length: 6 }, () =>
          Array.from({ length: 3 }, () => 'UN')
        ),
        touchscreen: false
      });
    }
  }

  function createEl(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  /* NEW: cycle entire row state */
  function cycleRow(unitIndex, face, rIndex) {
    const states = ['UN', 'PASS', 'FAIL'];
    const current = units[unitIndex][face][rIndex][0];
    const next = states[(states.indexOf(current) + 1) % 3];
    units[unitIndex][face][rIndex] = Array(3).fill(next);
    renderCurrentFace();
  }

  function renderPanel(container, data, unitIndex, face) {
    container.innerHTML = '';

    data.forEach((row, rIndex) => {
      const rowEl = createEl('div', 'uhc-row');
      const inner = createEl('div', 'uhc-row-inner');

      const labels = ["PASS", "FAIL", "---"];
      /* LED + LABEL + LED + LABEL + LED + LABEL */
      for (let c = 0; c < 3; c++) {
        const led = createEl('div', 'uhc-led ' + row[c].toLowerCase());
        led.onclick = () => {
          const order = ['UN', 'PASS', 'FAIL'];
          const next = order[(order.indexOf(row[c]) + 1) % 3];
          units[unitIndex][face][rIndex][c] = next;
          playComboSound();
          renderCurrentFace();
        };

        const label = createEl('div', 'uhc-label', labels[c]);

        inner.appendChild(led);
        inner.appendChild(label);
      }

      /* NEW 4TH BUTTON — row cycle + sound */
      const btn = createEl('div', 'uhc-row-btn');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24">
          <path d="M4 4h12v12H4z"/>
          <path d="M8 8h12v12H8z"/>
        </svg>
      `;
      btn.onclick = () => {
        cycleRow(unitIndex, face, rIndex);
        playComboSound();
      };

      inner.appendChild(btn);

      /* Row glow logic */
      if (row.every(v => v === 'PASS')) rowEl.classList.add('passRow');
      else if (row.every(v => v === 'FAIL')) rowEl.classList.add('failRow');

      rowEl.appendChild(inner);
      container.appendChild(rowEl);
    });
  }

  function renderCurrentFace() {
    const step = steps[currentStepIndex];
    const unitIndex = step.unit - 1;
    const face = step.face;

    /* HEADER TEXT */
    storeHeader.textContent = `${storeName} — ${storeNumber}`;
    const uhcNames = ["Left UHC", "Middle UHC", "Right UHC"];
    uhcNameHeader.textContent = uhcNames[unitIndex];
    unitHeader.textContent =
      `Unit ${step.unit} of ${TOTAL_UNITS} — ${face.charAt(0).toUpperCase() + face.slice(1)}`;

    /* PANEL VISIBILITY */
    frontWrapper.style.display = face === 'front' ? 'flex' : 'none';
    backWrapper.style.display = face === 'back' ? 'flex' : 'none';

    /* TOUCHSCREEN */
    touchscreenToggle.checked = units[unitIndex].touchscreen;
    touchscreenRow.style.display = face === 'front' ? 'flex' : 'none';
    backSpacer.style.display = face === 'front' ? 'block' : 'none';

    /* RENDER ROWS */
    if (face === 'front') {
      renderPanel(frontRows, units[unitIndex].front, unitIndex, 'front');
    } else {
      renderPanel(backRows, units[unitIndex].back, unitIndex, 'back');
    }

    /* NAV BUTTONS */
    backBtn.style.visibility = currentStepIndex === 0 ? 'hidden' : 'visible';
    nextBtn.style.display = currentStepIndex === steps.length - 1 ? 'none' : 'inline-block';
    finishBtn.style.display = currentStepIndex === steps.length - 1 ? 'inline-block' : 'none';
  }

  /* NAVIGATION */
  nextBtn.onclick = () => {
    const step = steps[currentStepIndex];
    const unitIndex = step.unit - 1;
    units[unitIndex].touchscreen = touchscreenToggle.checked;

    if (currentStepIndex < steps.length - 1) {
      currentStepIndex++;
      renderCurrentFace();
    }
  };

  backBtn.onclick = () => {
    if (currentStepIndex > 0) {
      currentStepIndex--;
      renderCurrentFace();
    }
  };

  /* FIXED: Finish now goes to report_select.html */
  finishBtn.onclick = () => {
    const payload = encodeURIComponent(JSON.stringify(units));
    window.location.href =
      `report_select.html?data=${payload}&store=${storeName}&num=${storeNumber}`;
  };

  /* URL PARSING */
  function parseURL() {
    const params = new URLSearchParams(window.location.search);
    storeName = params.get('store') || 'Store';
    storeNumber = params.get('num') || '';
  }

  /* INIT */
  parseURL();
  initUnits();
  renderCurrentFace();
</script>

</body>
</html>
