<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UHC Report</title>
<link rel="stylesheet" href="style.css">

<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="report.js" defer></script>
</head>

<body>

<div id="report" class="report">

    <h2 id="reportStore"></h2>
    <div id="reportTime"></div>

    <img id="pdfQR" />

    <div id="fullGridView"></div>

    <div id="totalFailures"></div>

    <div class="reportNav">
        <button id="backToTest">Back</button>
        <button id="newTest">New Test</button>
    </div>

    <button id="pdfBtn">Download PDF</button>
    <button id="sharePdfBtn">Share PDF</button>

</div>

</body>
</html>
