<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UHC Report</title>
<link rel="stylesheet" href="style.css">
<script src="report.js" defer></script>
</head>

<body>

<div class="report">

    <div id="reportTitle"></div>

    <div id="reportStore" style="margin-top:10px; font-size:20px;"></div>
    <div id="reportTime" style="margin-bottom:20px; opacity:0.8;"></div>

    <div id="totalFailures"
         style="font-size:22px; margin-bottom:20px; color:#ffeb3b; text-shadow:0 0 10px #ffeb3b;">
    </div>

    <div id="fullGridView"></div>

    <div class="reportNav">
        <button id="backToTest">Back</button>
        <button id="newTest">New Test</button>
    </div>

    <button id="shareAppBtn">Share App</button>

    <!-- QR CODE DISPLAY -->
    <img id="appQR" style="width:200px; margin:20px auto; display:none;" />

    <button id="pdfBtn">Download PDF</button>
    <button id="sharePdfBtn">Share PDF</button>

</div>

</body>
</html>
