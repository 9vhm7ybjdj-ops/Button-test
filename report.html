<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Report</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #7CFC00;
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 0 0 6px #00ff00;
  }

  .summary-card {
    border: 2px solid #00ff00;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 8px;
    box-shadow: 0 0 12px #00ff00;
  }

  .failText {
    color: #ff4444;
    text-shadow: 0 0 6px #ff0000;
  }

  #summaryTotals {
    margin-top: 30px;
    text-align: center;
    font-size: 22px;
    color: #ff4444;
    text-shadow: 0 0 6px #ff0000;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
  }

  .glowButton {
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 6px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
  }

  .glowButton:active {
    transform: scale(0.97);
  }
</style>
</head>

<body>

<h1>UHC TEST REPORT</h1>

<div id="summaryContainer"></div>

<div id="summaryTotals"></div>

<div class="btn-row">
  <button class="glowButton" onclick="window.location.href='index.html'">Back</button>
  <button class="glowButton" onclick="window.location.href='app.html'">New Test</button>
</div>

<script>
  // Read URL params
  const urlParams = new URLSearchParams(window.location.search);
  const storeName = urlParams.get("store") || "Unknown Store";
  const storeNum  = urlParams.get("num")   || "0000";

  // Read stored summary data
  const summaryData = JSON.parse(localStorage.getItem("uhcSummary")) || {};

  const container = document.getElementById("summaryContainer");

  let totalFrontFails = 0;
  let totalBackFails = 0;

  // Build summary cards
  for (let unit = 1; unit <= 3; unit++) {
    const data = summaryData[unit];
    if (!data) continue;

    totalFrontFails += data.frontFails;
    totalBackFails += data.backFails;

    const card = document.createElement("div");
    card.className = "summary-card";

    card.innerHTML = `
      <h2>Unit ${unit}</h2>
      <p><strong>Store:</strong> ${storeNum} - ${storeName}</p>
      <p><strong>Front Failed Rows:</strong> 
         <span class="failText">${data.frontFails}</span></p>
      <p><strong>Back Failed Rows:</strong> 
         <span class="failText">${data.backFails}</span></p>
      <p><strong>Front Fail List:</strong> ${data.frontList.join(", ") || "None"}</p>
      <p><strong>Back Fail List:</strong> ${data.backList.join(", ") || "None"}</p>
    `;

    container.appendChild(card);
  }

  // Insert TOTALS at bottom
  document.getElementById("summaryTotals").innerHTML = `
    TOTAL FRONT FAILED ROWS: ${totalFrontFails}<br>
    TOTAL BACK FAILED ROWS: ${totalBackFails}
  `;
</script>

</body>
</html>
