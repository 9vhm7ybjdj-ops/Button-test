<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Report</title>

<link rel="stylesheet" href="style.css?v=8">
<script src="report.js" defer></script>
</head>

<body>

<div class="report">

    <div id="reportTitle"></div>
    <div id="reportTime" style="margin-bottom:20px; opacity:0.8;"></div>

    <div id="totalFailures"></div>

    <div id="fullGridView"></div>

    <div class="reportNav">
        <button id="backToTest">Back</button>
        <button id="newTest">New Test</button>
    </div>

    <button id="shareAppBtn">Share App</button>
    <img id="appQR" style="width:200px; margin:20px auto; display:none;" />

    <button id="sharePdfBtn">Share PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
