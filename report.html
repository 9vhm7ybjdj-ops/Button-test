<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Report</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  #app {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    box-sizing: border-box;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
  }

  h2 {
    text-align: center;
    margin-top: 0;
    opacity: 0.8;
  }

  .timestamp {
    text-align: center;
    margin-top: 5px;
    margin-bottom: 20px;
    opacity: 0.7;
    font-size: 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 30px;
    font-size: 18px;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid #444;
    text-align: left;
  }

  th {
    background: #222;
  }

  tr:nth-child(even) {
    background: #1a1a1a;
  }

  #totalsBlock {
    margin-top: 30px;
    text-align: center;
    font-size: 22px;
    color: #ff4444;
    text-shadow: 0 0 6px #ff0000;
  }

  .actionBtn {
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
  }

  .actionBtn:active {
    transform: scale(0.97);
  }

  .actionRow {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
  }

  .smallBtn {
    width: 180px;
  }

  @media print {
    .actionRow {
      display: none;
    }

    @page {
      size: A4 landscape;
      margin: 0;
    }
  }
</style>
</head>

<body>
<div id="app">

  <h1>UHC Test Report</h1>
  <h2 id="storeHeader"></h2>
  <div id="timestamp" class="timestamp"></div>

  <table id="reportTable">
    <tr>
      <th>Unit</th>
      <th>Face</th>
      <th>Status</th>
    </tr>
  </table>

  <div id="totalsBlock"></div>

  <div class="actionRow">
    <button id="newTestBtn" class="actionBtn smallBtn">New Test</button>
    <button id="printBtn" class="actionBtn smallBtn">Print Report</button>
  </div>

</div>

<script>
  const fullData = JSON.parse(sessionStorage.getItem("uhcFullData") || "[]");
  const storeName = sessionStorage.getItem("storeName") || "";
  const storeNumber = sessionStorage.getItem("storeNumber") || "";

  const now = new Date();
  const timestamp = now.toLocaleString("en-AU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });

  document.getElementById("storeHeader").textContent =
    `${storeName} — ${storeNumber}`;

  document.getElementById("timestamp").textContent =
    `Completed: ${timestamp}`;

  const table = document.getElementById("reportTable");

  let totalFrontFailedRows = 0;
  let totalBackFailedRows = 0;

  // ⭐ Build summary directly from fullData
  const summary = [];

  fullData.forEach((unit, index) => {

    // FRONT
    if (unit.touchscreen) {
      summary.push({
        unit: index + 1,
        face: "front",
        status: "Skipped (Touchscreen)"
      });
    } else {
      const failedFront = unit.front.filter(
        row => row.includes("FAIL")
      ).length;

      summary.push({
        unit: index + 1,
        face: "front",
        status: `${failedFront} failed rows`
      });

      totalFrontFailedRows += failedFront;
    }

    // BACK
    if (unit.touchscreen) {
      summary.push({
        unit: index + 1,
        face: "back",
        status: "Skipped (Touchscreen)"
      });
    } else {
      const failedBack = unit.back.filter(
        row => row.includes("FAIL")
      ).length;

      summary.push({
        unit: index + 1,
        face: "back",
        status: `${failedBack} failed rows`
      });

      totalBackFailedRows += failedBack;
    }
  });

  // ⭐ Render summary rows
  summary.forEach(item => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>Unit ${item.unit}</td>
      <td>${item.face.charAt(0).toUpperCase() + item.face.slice(1)}</td>
      <td>${item.status}</td>
    `;

    table.appendChild(row);
  });

  // ⭐ Totals
  document.getElementById("totalsBlock").innerHTML = `
    TOTAL FRONT FAILED ROWS: ${totalFrontFailedRows}<br>
    TOTAL BACK FAILED ROWS: ${totalBackFailedRows}
  `;

  document.getElementById("printBtn").onclick = () => window.print();

  document.getElementById("newTestBtn").onclick = () => {
    sessionStorage.clear();
    window.location.href = "index.html";
  };
</script>

</body>
</html>
