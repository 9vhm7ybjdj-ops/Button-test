<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Report</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  #app {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    box-sizing: border-box;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
  }

  h2 {
    text-align: center;
    margin-top: 0;
    opacity: 0.8;
  }

  .timestamp {
    text-align: center;
    margin-top: 5px;
    margin-bottom: 20px;
    opacity: 0.7;
    font-size: 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 30px;
    font-size: 18px;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid #444;
    text-align: left;
  }

  th {
    background: #222;
  }

  tr:nth-child(even) {
    background: #1a1a1a;
  }

  #totalsBlock {
    margin-top: 30px;
    text-align: center;
    font-size: 22px;
    color: #ff4444;
    text-shadow: 0 0 6px #ff0000;
  }

  .actionBtn {
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 8px;
    background: #111;
    color: #7CFC00;
    border: 2px solid #00ff00;
    text-shadow: 0 0 6px #00ff00;
    box-shadow: 0 0 12px #00ff00;
    cursor: pointer;
    margin-top: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .actionBtn:active {
    transform: scale(0.97);
  }

  @media print {
    .actionBtn {
      display: none;
    }

    @page {
      size: A4 landscape;
      margin: 0;
    }
  }
</style>
</head>

<body>
<div id="app">

  <h1>UHC Test Report</h1>
  <h2 id="storeHeader"></h2>
  <div id="timestamp" class="timestamp"></div>

  <table id="reportTable">
    <tr>
      <th>Unit</th>
      <th>Face</th>
      <th>Status</th>
    </tr>
  </table>

  <div id="totalsBlock"></div>

  <!-- ⭐ BACK + NEW TEST ABOVE PRINT -->
  <button id="backBtn" class="actionBtn">Back</button>
  <button id="newTestBtn" class="actionBtn">New Test</button>

  <!-- ⭐ PRINT BUTTON LAST -->
  <button id="printBtn" class="actionBtn">Print Report</button>

</div>

<script>
  // Load stored data
  const summary = JSON.parse(sessionStorage.getItem("uhcSummary") || "[]");
  const storeName = sessionStorage.getItem("storeName") || "";
  const storeNumber = sessionStorage.getItem("storeNumber") || "";
  const lastUnit = sessionStorage.getItem("lastUnit") || 1;
  const lastFace = sessionStorage.getItem("lastFace") || "front";

  // Auto-generate timestamp
  const now = new Date();
  const timestamp = now.toLocaleString("en-AU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });

  // Set store header
  document.getElementById("storeHeader").textContent =
    `${storeName} — ${storeNumber}`;

  // Insert timestamp
  document.getElementById("timestamp").textContent =
    `Completed: ${timestamp}`;

  // Populate table + totals
  const table = document.getElementById("reportTable");

  let totalFrontFails = 0;
  let totalBackFails = 0;

  summary.forEach(item => {
    const row = document.createElement("tr");

    const faceLabel =
      item.face.charAt(0).toUpperCase() + item.face.slice(1);

    row.innerHTML = `
      <td>Unit ${item.unit}</td>
      <td>${faceLabel}</td>
      <td>${item.status}</td>
    `;

    table.appendChild(row);

    const isFail = String(item.status).toUpperCase().includes("FAIL");

    // ⭐ Bulletproof face detection
    const face = item.face.toLowerCase();
    const isFront = face.includes("front");
    const isBack = face.includes("back") || face.includes("rear");

    if (isFail && isFront) totalFrontFails++;
    if (isFail && isBack) totalBackFails++;
  });

  document.getElementById("totalsBlock").innerHTML = `
    TOTAL FRONT FAILED ROWS: ${totalFrontFails}<br>
    TOTAL BACK FAILED ROWS: ${totalBackFails}
  `;

  // Print
  document.getElementById("printBtn").onclick = () => window.print();

  // Back button → return to last unit/face
  document.getElementById("backBtn").onclick = () => {
    window.location.href =
      `app.html?resume=1&unit=${lastUnit}&face=${lastFace}`;
  };

  // New Test button → reset + go to store select
  document.getElementById("newTestBtn").onclick = () => {
    sessionStorage.clear();
    window.location.href = "index.html";
  };
</script>

</body>
</html>
