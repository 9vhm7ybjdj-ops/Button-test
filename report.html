<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UHC Report</title>
<style>
  html, body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  #pdfWrapper {
    width: 794px; /* A4 width at 96dpi */
    margin: 0 auto;
    background: #000;
    padding: 10px;
  }

  #reportTitle {
    font-size: 20px;
    text-align: center;
    margin-top: 10px;
    margin-bottom: 4px;
  }
  #reportTime {
    text-align: center;
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 10px;
  }
  #totalFailures {
    text-align: center;
    margin-bottom: 10px;
    font-size: 14px;
  }

  .unitRow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .reportFace {
    background: #000;
    padding: 10px;
    border: 1px solid #333;
    margin: 0;
  }

  .sectionHeader {
    font-size: 16px;
    white-space: nowrap;
    text-align: center;
    margin-bottom: 8px;
  }

  .gridRowInner {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
  }
  .gridRowInner.rowPass {
    justify-content: center;
    box-shadow: 0 0 20px #00ff00;
    border-radius: 6px;
  }
  .gridRowInner.rowFail {
    justify-content: center;
    box-shadow: 0 0 20px #ff0000;
    border-radius: 6px;
  }

  .cell {
    padding: 4px 8px;
    background: #111;
    border: 1px solid #333;
    text-align: center;
    font-size: 12px;
    min-width: 40px;
  }

  .reportNav {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
  }
  .reportNav button,
  #shareAppBtn,
  #sharePdfBtn {
    padding: 10px 14px;
    font-size: 14px;
    background: #111;
    border: 1px solid #444;
    color: #fff;
    border-radius: 6px;
  }

  #appQR {
    display: block;
    margin: 10px auto;
  }

  #buildTag {
    text-align: center;
    font-size: 11px;
    opacity: 0.5;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div id="pdfWrapper">
  <div id="reportTitle"></div>
  <div id="reportTime"></div>

  <div id="totalFailures"></div>
  <div id="fullGridView"></div>

  <div class="reportNav">
    <button id="backToTest">Back</button>
    <button id="newTest">New Test</button>
  </div>

  <button id="shareAppBtn">Share App</button>
  <img id="appQR" style="width:200px; display:none;" />

  <button id="sharePdfBtn">Share PDF</button>

  <div id="buildTag">UHC Testing — Build 2.0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  const params = new URLSearchParams(location.search);
  const raw = params.get("data");
  let parsed;
  try {
    parsed = JSON.parse(decodeURIComponent(raw));
  } catch (e) {
    alert("Error loading report data.");
    parsed = { store: "Unknown", units: [], lastScreen: 0 };
  }

  const storeName = parsed.store || "No Store Selected";
  const units = parsed.units || [];
  const lastScreen = parseInt(params.get("screen")) || 0;

  document.getElementById("reportTitle").textContent =
    `UHC Button Test – ${storeName}`;
  document.getElementById("reportTime").textContent =
    new Date().toLocaleString();

  const full = document.getElementById("fullGridView");

  const unitNames = {
    0: "Left UHC",
    1: "Middle UHC",
    2: "Right UHC"
  };

  function generateQR(url) {
    return `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
  }

  let frontFails = 0;
  let backFails = 0;

  [0,1,2].forEach(u => {
    const unit = units[u];
    if (!unit) return;

    const row = el("div", "unitRow");

    ["front", "back"].forEach(side => {
      const face = el("div", "reportFace");
      face.appendChild(el("div", "sectionHeader",
        `${unitNames[u]} — ${side === "front" ? "Front" : "Back"}`));

      if (unit.skip) {
        const skippedBox = el("div", "", "SKIPPED");
        skippedBox.style.fontSize = "24px";
        skippedBox.style.textAlign = "center";
        skippedBox.style.padding = "30px 0";
        skippedBox.style.color = "#ffeb3b";
        skippedBox.style.textShadow = "0 0 12px #ffeb3b";
        face.appendChild(skippedBox);
        row.appendChild(face);
        return;
      }

      unit[side].forEach(r => {
        const inner = el("div", "gridRowInner");

        if (r.some(v => v === "FAIL")) {
          inner.classList.add("rowFail");
          if (side === "front") frontFails++;
          else backFails++;
        }
        if (r.every(v => v === "PASS")) {
          inner.classList.add("rowPass");
        }

        r.forEach(v => {
          const cell = el("div", "cell", v === "UN" ? "- - -" : v);
          inner.appendChild(cell);
        });

        face.appendChild(inner);
      });

      row.appendChild(face);
    });

    full.appendChild(row);
  });

  document.getElementById("totalFailures").innerHTML =
    `<span style="color:#ff4444;">Front Fails: ${frontFails}</span> &nbsp;&nbsp; 
     <span style="color:#ff4444;">Back Fails: ${backFails}</span>`;

  document.getElementById("backToTest").onclick = () => {
    const cb = Date.now();
    window.location.href = `app.html?screen=${lastScreen}&cb=${cb}`;
  };

  document.getElementById("newTest").onclick = () => {
    const cb = Date.now();
    window.location.href = "app.html?cb=" + cb;
  };

  document.getElementById("shareAppBtn").onclick = () => {
    const appURL = location.origin + location.pathname.replace("report.html", "index.html");
    const qrURL = generateQR(appURL);
    const img = document.getElementById("appQR");
    img.src = qrURL;
    img.style.display = "block";
  };

  async function sharePDF() {
    const report = document.getElementById("pdfWrapper");

    await new Promise(r => requestAnimationFrame(r));
    await new Promise(r => requestAnimationFrame(r));

    const opt = {
      margin: 0,
      filename: `UHC-Report-${storeName}.pdf`,
      image: { type: "jpeg", quality: 1 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: "#000" },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    };

    try {
      const pdfBlob = await html2pdf().set(opt).from(report).outputPdf("blob");
      const file = new File(
        [pdfBlob],
        `UHC-Report-${storeName}.pdf`,
        { type: "application/pdf" }
      );

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: "UHC Report",
          text: "UHC Button Test Report"
        });
      } else {
        alert("Sharing not supported on this device.");
      }
    } catch (e) {
      alert("PDF generation failed.");
      console.error(e);
    }
  }

  document.getElementById("sharePdfBtn").onclick = sharePDF;
</script>

</body>
</html>
